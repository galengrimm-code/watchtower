let currentFilter = "All";
let currentSort = "default";
let expandedCard = null;

function getCompletionColor(p) {
  if (p === 100) return "#4caf50";
  if (p >= 90) return "#8bc34a";
  if (p >= 75) return "#ffc107";
  return "#ff9800";
}

function ringSVG(percent) {
  if (percent == null) return '<span class="ring-na">N/A</span>';
  const size = 44, r = (size - 6) / 2, circ = 2 * Math.PI * r;
  const offset = circ - (percent / 100) * circ;
  const color = getCompletionColor(percent);
  return `<svg class="ring" width="${size}" height="${size}">
    <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="#2a2a2a" stroke-width="3"/>
    <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${color}" stroke-width="3"
      stroke-dasharray="${circ}" stroke-dashoffset="${offset}" stroke-linecap="round"
      transform="rotate(-90 ${size/2} ${size/2})" style="transition:stroke-dashoffset 0.6s ease"/>
    <text x="${size/2}" y="${size/2 + 1}" text-anchor="middle" dominant-baseline="middle"
      fill="#e0e0e0" font-size="11">${percent}%</text>
  </svg>`;
}

function techHTML(tech) {
  const entries = Object.entries(tech).filter(([,v]) => v);
  if (entries.length === 0) return '<div class="tech-empty">Tech stack not documented</div>';
  return '<div class="tech-stack">' + entries.map(([k, v]) => `
    <div class="tech-row">
      <span class="tech-icon">${TECH_ICONS[k] || "•"}</span>
      <div>
        <div class="tech-label">${TECH_LABELS[k] || k}</div>
        <div class="tech-value">${Array.isArray(v) ? v.join(", ") : v}</div>
      </div>
    </div>`).join("") + '</div>';
}

function envHTML(secrets) {
  if (!secrets || secrets.length === 0) return '';
  return `<div class="env-section">
    <div class="section-label">Env Secrets (${secrets.length})</div>
    <div class="env-list">${secrets.map(s => `<span class="env-chip">${s}</span>`).join("")}</div>
  </div>`;
}

function metricsHTML(metrics) {
  if (!metrics) return '';
  const typeColors = { ".jsx": "#5b9bd5", ".js": "#e8c547", ".ts": "#b388d9", ".tsx": "#9966cc", ".css": "#4caf50", ".json": "#666", ".html": "#e06050" };
  // Phase C v6.4 update_dashboard.py emits some apps without linesByType.
  const typeEntries = Object.entries(metrics.linesByType || {}).filter(([,v]) => v > 0).sort((a,b) => b[1] - a[1]);
  const totalTypeLines = typeEntries.reduce((s, [,v]) => s + v, 0);

  let html = `<div class="env-section"><div class="section-label">Code Metrics</div>`;
  html += `<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:8px;margin-bottom:12px">`;
  // Phase C v6.4 update_dashboard.py wrote `totalLines` only — fall back when codeLines absent.
  const _codeLines = metrics.codeLines ?? metrics.totalLines ?? 0;
  const _totalLines = metrics.totalLines ?? metrics.codeLines ?? 0;
  html += `<div style="background:#0d0d0d;border:1px solid #222;border-radius:6px;padding:8px 10px;text-align:center"><div style="font-size:16px;font-weight:700;font-family:var(--mono);color:#5b9bd5">${_codeLines.toLocaleString()}</div><div style="font-size:9px;color:#555;text-transform:uppercase;letter-spacing:0.05em;font-family:var(--mono);margin-top:2px">Code Lines</div>`;
  if (metrics.dataLines > 0) html += `<div style="font-size:9px;color:#444;font-family:var(--mono)">${_totalLines.toLocaleString()} incl. data</div>`;
  html += `</div>`;
  // Codex review 2026-05-21: many app metrics entries omit filesOver500 / duplicationAreas
  // entirely. Without coercion, the card rendered the literal string "undefined". Coerce
  // to 0 with Number() and the OR-fallback.
  const _filesOver500 = Number(metrics.filesOver500 ?? 0) || 0;
  const _duplicationAreas = Number(metrics.duplicationAreas ?? 0) || 0;
  html += `<div style="background:#0d0d0d;border:1px solid #222;border-radius:6px;padding:8px 10px;text-align:center"><div style="font-size:16px;font-weight:700;font-family:var(--mono);color:${_filesOver500 > 0 ? '#e0a030' : '#4caf50'}">${_filesOver500}</div><div style="font-size:9px;color:#555;text-transform:uppercase;letter-spacing:0.05em;font-family:var(--mono);margin-top:2px">Files 1500+</div></div>`;
  html += `<div style="background:#0d0d0d;border:1px solid #222;border-radius:6px;padding:8px 10px;text-align:center"><div style="font-size:16px;font-weight:700;font-family:var(--mono);color:${_duplicationAreas > 0 ? '#e0a030' : '#4caf50'}">${_duplicationAreas}</div><div style="font-size:9px;color:#555;text-transform:uppercase;letter-spacing:0.05em;font-family:var(--mono);margin-top:2px">Duplication</div></div>`;
  html += `</div>`;

  // Composition row
  const parts = [];
  if (metrics.components > 0) parts.push(`${metrics.components} components`);
  if (metrics.pages > 0) parts.push(`${metrics.pages} pages`);
  if (metrics.apiRoutes > 0) parts.push(`${metrics.apiRoutes} API routes`);
  if (parts.length > 0) {
    html += `<div style="font-size:12px;color:#888;font-family:var(--mono);margin-bottom:8px">${parts.join(" · ")}</div>`;
  }

  // Stacked bar
  if (totalTypeLines > 0) {
    html += `<div class="metrics-stacked-bar">`;
    typeEntries.forEach(([ext, lines]) => {
      const pct = (lines / totalTypeLines) * 100;
      const color = typeColors[ext] || "#555";
      html += `<div class="metrics-stacked-seg" style="width:${pct}%;background:${color}"></div>`;
    });
    html += `</div>`;
    html += `<div class="metrics-legend">`;
    typeEntries.forEach(([ext, lines]) => {
      const color = typeColors[ext] || "#555";
      html += `<span class="metrics-legend-item"><span class="metrics-legend-swatch" style="background:${color}"></span>${ext} ${lines.toLocaleString()}</span>`;
    });
    html += `</div>`;
  }
  html += `</div>`;
  return html;
}

function securityPostureHTML(posture) {
  if (!posture) return '';

  let html = `<div class="env-section"><div class="section-label">Security Posture</div>`;
  html += `<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px">`;

  // Headers section
  if (posture.headers) {
    const h = posture.headers;
    const headerCount = [h.csp, h.hsts, h.xContentType, h.xFrameOptions, h.referrerPolicy].filter(v => v && v !== 'missing').length;
    const headerColor = headerCount >= 4 ? '#4caf50' : headerCount >= 2 ? '#e0a030' : '#e05555';
    html += `<div style="background:#0d0d0d;border:1px solid #222;border-radius:6px;padding:10px">`;
    html += `<div style="font-size:10px;color:#555;text-transform:uppercase;letter-spacing:0.05em;font-family:var(--mono);margin-bottom:6px">Security Headers</div>`;
    html += `<div style="font-size:14px;font-weight:700;font-family:var(--mono);color:${headerColor};margin-bottom:6px">${headerCount}/5</div>`;
    const headers = [
      { name: 'CSP', val: h.csp },
      { name: 'HSTS', val: h.hsts },
      { name: 'X-Content-Type', val: h.xContentType },
      { name: 'X-Frame', val: h.xFrameOptions },
      { name: 'Referrer', val: h.referrerPolicy }
    ];
    headers.forEach(hdr => {
      const present = hdr.val && hdr.val !== 'missing';
      html += `<div style="font-size:10px;font-family:var(--mono);color:${present ? '#4caf50' : '#666'};margin-top:2px">${present ? '✓' : '✗'} ${hdr.name}</div>`;
    });
    html += `</div>`;
  }

  // Cookies section
  if (posture.cookies) {
    const c = posture.cookies;
    const cookieFlags = [c.httpOnly === true || c.httpOnly === 'true', c.secure === true || c.secure === 'true', c.sameSite && c.sameSite !== 'not set'];
    const cookieCount = cookieFlags.filter(Boolean).length;
    const cookieColor = cookieCount === 3 ? '#4caf50' : cookieCount >= 1 ? '#e0a030' : '#e05555';
    html += `<div style="background:#0d0d0d;border:1px solid #222;border-radius:6px;padding:10px">`;
    html += `<div style="font-size:10px;color:#555;text-transform:uppercase;letter-spacing:0.05em;font-family:var(--mono);margin-bottom:6px">Cookie Security</div>`;
    html += `<div style="font-size:14px;font-weight:700;font-family:var(--mono);color:${cookieColor};margin-bottom:6px">${cookieCount}/3</div>`;
    html += `<div style="font-size:10px;font-family:var(--mono);color:${cookieFlags[0] ? '#4caf50' : '#666'};margin-top:2px">${cookieFlags[0] ? '✓' : '✗'} httpOnly</div>`;
    html += `<div style="font-size:10px;font-family:var(--mono);color:${cookieFlags[1] ? '#4caf50' : '#666'};margin-top:2px">${cookieFlags[1] ? '✓' : '✗'} secure</div>`;
    html += `<div style="font-size:10px;font-family:var(--mono);color:${cookieFlags[2] ? '#4caf50' : '#666'};margin-top:2px">${cookieFlags[2] ? '✓' : '✗'} sameSite${c.sameSite && c.sameSite !== 'not set' ? ` (${c.sameSite})` : ''}</div>`;
    html += `</div>`;
  }
  html += `</div>`;

  // XSS Vectors row
  if (posture.xssVectors) {
    const x = posture.xssVectors;
    const total = (x.dangerouslySetInnerHTML || 0) + (x.innerHTML || 0) + (x.eval || 0) + (x.documentWrite || 0);
    if (total > 0) {
      html += `<div style="background:#2a1a1a;border:1px solid #4a2222;border-radius:6px;padding:8px 10px;margin-top:8px">`;
      html += `<div style="font-size:10px;color:#ff6666;text-transform:uppercase;letter-spacing:0.05em;font-family:var(--mono);margin-bottom:4px">XSS Vectors Found: ${total}</div>`;
      const vectors = [];
      if (x.dangerouslySetInnerHTML > 0) vectors.push(`dangerouslySetInnerHTML: ${x.dangerouslySetInnerHTML}`);
      if (x.innerHTML > 0) vectors.push(`innerHTML: ${x.innerHTML}`);
      if (x.eval > 0) vectors.push(`eval: ${x.eval}`);
      if (x.documentWrite > 0) vectors.push(`document.write: ${x.documentWrite}`);
      html += `<div style="font-size:11px;font-family:var(--mono);color:#cc8888">${vectors.join(' · ')}</div>`;
      html += `</div>`;
    }
  }

  // Other checks row
  const checks = [];
  if (posture.sqlInjection) {
    const safe = posture.sqlInjection.toLowerCase().includes('parameterized') || posture.sqlInjection === 'N/A';
    checks.push({ label: 'SQL', value: posture.sqlInjection, safe });
  }
  if (posture.csrfProtection) {
    const safe = posture.csrfProtection.toLowerCase().includes('found') || posture.csrfProtection === 'N/A';
    checks.push({ label: 'CSRF', value: posture.csrfProtection, safe });
  }
  if (posture.fileUpload) {
    const safe = posture.fileUpload.toLowerCase().includes('validated') || posture.fileUpload === 'N/A';
    checks.push({ label: 'Upload', value: posture.fileUpload, safe });
  }
  if (checks.length > 0) {
    html += `<div style="display:flex;gap:12px;margin-top:8px;flex-wrap:wrap">`;
    checks.forEach(chk => {
      html += `<div style="font-size:11px;font-family:var(--mono);color:${chk.safe ? '#4caf50' : '#e0a030'}">${chk.safe ? '✓' : '⚠'} ${chk.label}: ${chk.value}</div>`;
    });
    html += `</div>`;
  }

  // Env exposure
  if (posture.envExposure && posture.envExposure.length > 0) {
    html += `<div style="background:#2a2a1a;border:1px solid #4a4a22;border-radius:6px;padding:8px 10px;margin-top:8px">`;
    html += `<div style="font-size:10px;color:#e0a030;text-transform:uppercase;letter-spacing:0.05em;font-family:var(--mono);margin-bottom:4px">⚠ Public Env Exposure</div>`;
    html += `<div style="font-size:11px;font-family:var(--mono);color:#ccaa66">${posture.envExposure.join(', ')}</div>`;
    html += `</div>`;
  }

  html += `</div>`;
  return html;
}

function deployedSurfaceHTML(ds) {
  if (!ds || !ds.scanned) return '';

  let html = `<div class="env-section"><div class="section-label">Deployed Surface Scan</div>`;
  html += `<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px">`;

  // Deployed Headers verification
  if (ds.deployedHeaders) {
    const h = ds.deployedHeaders;
    const headerChecks = [h.csp, h.hsts, h.xContentType, h.xFrameOptions, h.referrerPolicy, h.permissionsPolicy];
    const headerCount = headerChecks.filter(v => v && v !== 'missing').length;
    const headerColor = headerCount >= 5 ? '#4caf50' : headerCount >= 3 ? '#e0a030' : '#e05555';
    html += `<div style="background:#0d0d0d;border:1px solid #222;border-radius:6px;padding:10px">`;
    html += `<div style="font-size:10px;color:#555;text-transform:uppercase;letter-spacing:0.05em;font-family:var(--mono);margin-bottom:6px">Deployed Headers</div>`;
    html += `<div style="font-size:14px;font-weight:700;font-family:var(--mono);color:${headerColor};margin-bottom:6px">${headerCount}/6</div>`;
    const headers = [
      { name: 'CSP', val: h.csp },
      { name: 'HSTS', val: h.hsts },
      { name: 'X-Content-Type', val: h.xContentType },
      { name: 'X-Frame', val: h.xFrameOptions },
      { name: 'Referrer', val: h.referrerPolicy },
      { name: 'Permissions', val: h.permissionsPolicy }
    ];
    headers.forEach(hdr => {
      const present = hdr.val && hdr.val !== 'missing';
      html += `<div style="font-size:10px;font-family:var(--mono);color:${present ? '#4caf50' : '#666'};margin-top:2px">${present ? '✓' : '✗'} ${hdr.name}</div>`;
    });
    if (h.corsOrigin) {
      const corsOpen = h.corsOrigin === '*';
      html += `<div style="font-size:10px;font-family:var(--mono);color:${corsOpen ? '#e05555' : '#4caf50'};margin-top:4px">${corsOpen ? '⚠ CORS: *' : '✓ CORS: ' + h.corsOrigin}</div>`;
    }
    html += `</div>`;
  }

  // Auth Provider Config
  if (ds.authProvider && ds.authProvider.provider !== 'none') {
    const ap = ds.authProvider;
    const pp = ap.passwordPolicy || {};
    const strengthColor = pp.strength === 'strong' ? '#4caf50' : pp.strength === 'moderate' ? '#e0a030' : '#e05555';
    html += `<div style="background:#0d0d0d;border:1px solid #222;border-radius:6px;padding:10px">`;
    html += `<div style="font-size:10px;color:#555;text-transform:uppercase;letter-spacing:0.05em;font-family:var(--mono);margin-bottom:6px">Auth: ${ap.provider}${ap.version ? ' v' + ap.version : ''}</div>`;
    html += `<div style="font-size:12px;font-weight:700;font-family:var(--mono);color:${strengthColor};margin-bottom:6px">Password: ${pp.strength || 'unknown'}</div>`;
    html += `<div style="font-size:10px;font-family:var(--mono);color:${pp.minLength >= 12 ? '#4caf50' : '#e0a030'};margin-top:2px">${pp.minLength >= 12 ? '✓' : '✗'} Min length: ${pp.minLength || '?'}</div>`;
    html += `<div style="font-size:10px;font-family:var(--mono);color:${pp.hibpCheck ? '#4caf50' : '#e05555'};margin-top:2px">${pp.hibpCheck ? '✓' : '✗'} HIBP breach check</div>`;
    html += `<div style="font-size:10px;font-family:var(--mono);color:${ap.captchaEnabled ? '#4caf50' : '#e05555'};margin-top:2px">${ap.captchaEnabled ? '✓' : '✗'} CAPTCHA</div>`;
    html += `<div style="font-size:10px;font-family:var(--mono);color:${ap.enumerationProtection ? '#4caf50' : '#e05555'};margin-top:2px">${ap.enumerationProtection ? '✓' : '✗'} Enum protection</div>`;
    html += `<div style="font-size:10px;font-family:var(--mono);color:${ap.mfaEnforced ? '#4caf50' : '#e0a030'};margin-top:2px">${ap.mfaEnforced ? '✓ MFA enforced' : '○ MFA optional'}</div>`;
    if (ap.lockout) {
      const lockColor = ap.lockout.maxAttempts <= 20 ? '#4caf50' : '#e0a030';
      html += `<div style="font-size:10px;font-family:var(--mono);color:${lockColor};margin-top:2px">Lockout: ${ap.lockout.maxAttempts} attempts / ${ap.lockout.durationMinutes}min</div>`;
    }
    html += `</div>`;
  }
  html += `</div>`;

  // Info Leakage row
  if (ds.infoLeakage) {
    const il = ds.infoLeakage;
    const leaks = [];
    if (il.healthEndpoint && il.healthEndpoint.includes('exposed')) leaks.push({ label: 'Health endpoint', detail: il.healthEndpoint, bad: true });
    if (il.sentryDSN && il.sentryDSN.includes('found')) leaks.push({ label: 'Sentry DSN', detail: il.sentryDSN, bad: true });
    if (il.buildManifest && il.buildManifest.includes('exposed')) leaks.push({ label: 'Build manifest', detail: il.buildManifest, bad: true });
    if (il.serverVersion && il.serverVersion.includes('disclosed')) leaks.push({ label: 'Server version', detail: il.serverVersion, bad: true });

    if (leaks.length > 0) {
      html += `<div style="background:#2a1a1a;border:1px solid #4a2222;border-radius:6px;padding:8px 10px;margin-top:8px">`;
      html += `<div style="font-size:10px;color:#ff6666;text-transform:uppercase;letter-spacing:0.05em;font-family:var(--mono);margin-bottom:4px">Info Leakage: ${leaks.length} found</div>`;
      leaks.forEach(l => {
        html += `<div style="font-size:10px;font-family:var(--mono);color:#cc8888;margin-top:2px">⚠ ${l.label}</div>`;
      });
      html += `</div>`;
    } else {
      html += `<div style="font-size:11px;font-family:var(--mono);color:#4caf50;margin-top:8px">✓ No info leakage detected</div>`;
    }
  }

  // Header mismatches
  if (ds.headerMismatches && ds.headerMismatches.length > 0) {
    html += `<div style="background:#2a2a1a;border:1px solid #4a4a22;border-radius:6px;padding:8px 10px;margin-top:8px">`;
    html += `<div style="font-size:10px;color:#e0a030;text-transform:uppercase;letter-spacing:0.05em;font-family:var(--mono);margin-bottom:4px">⚠ Header Mismatches</div>`;
    html += `<div style="font-size:11px;font-family:var(--mono);color:#ccaa66">${ds.headerMismatches.join(', ')}</div>`;
    html += `</div>`;
  }

  // Security.txt & robots.txt
  const metaChecks = [];
  if (ds.securityTxt) metaChecks.push({ label: 'security.txt', present: ds.securityTxt === 'present' });
  if (ds.robotsTxt) metaChecks.push({ label: 'robots.txt', present: ds.robotsTxt === 'present' });
  if (metaChecks.length > 0) {
    html += `<div style="display:flex;gap:12px;margin-top:8px;flex-wrap:wrap">`;
    metaChecks.forEach(chk => {
      html += `<div style="font-size:10px;font-family:var(--mono);color:${chk.present ? '#4caf50' : '#666'}">${chk.present ? '✓' : '○'} ${chk.label}</div>`;
    });
    html += `</div>`;
  }

  html += `</div>`;
  return html;
}

function operationalHealthHTML(app) {
  const mt = app.multiTenant;
  const es = app.errorSanitization;
  const sc = app.serverlessCompat;
  const rc = app.routeConsistency;
  const su = app.supplyChain;
  const fm = app.formatting;

  // Only show if at least one section has data
  if (!mt && !es && !sc && !rc && !su && !fm) return '';

  let html = `<div class="env-section"><div class="section-label">Operational Health</div>`;
  html += `<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px">`;

  // Multi-tenant isolation
  if (mt && mt.isMultiTenant) {
    const safe = mt.tenantIdSource === 'session-derived';

    html += `<div style="background:#0d0d0d;border:1px solid #222;border-radius:6px;padding:10px">`;

    html += `<div style="font-size:10px;font-family:var(--mono);color:#666">Field: ${mt.tenantIdField || 'N/A'} · ${mt.routesChecked || 0} routes checked</div>`;
    if (mt.routesWithClientTenantId > 0) {
      html += `<div style="font-size:10px;font-family:var(--mono);color:#ff6666;margin-top:4px">⚠ ${mt.routesWithClientTenantId} routes use client-supplied ID</div>`;
    }

  // Error sanitization
  if (es && es.routesChecked > 0) {
    const safe = es.routesLeakingDetails === 0;
    const color = safe ? '#4caf50' : '#F97316';
    html += `<div style="background:#0d0d0d;border:1px solid #222;border-radius:6px;padding:10px">`;
    html += `<div style="font-size:10px;color:#555;text-transform:uppercase;letter-spacing:0.05em;font-family:var(--mono);margin-bottom:6px">Error Sanitization</div>`;
    html += `<div style="font-size:12px;font-family:var(--mono);color:${color}">${safe ? '✓ All sanitized' : `⚠ ${es.routesLeakingDetails} routes leak details`}</div>`;
    html += `<div style="font-size:10px;font-family:var(--mono);color:#666;margin-top:4px">${es.routesChecked} routes checked</div>`;
    if (es.leakingFiles && es.leakingFiles.length > 0) {
      html += `<div style="font-size:10px;font-family:var(--mono);color:#fb923c;margin-top:4px">${es.leakingFiles.join(', ')}</div>`;
    }
    html += `</div>`;
  }

  // Serverless compatibility
  if (sc && sc.isServerless) {
    const safe = sc.inMemoryStateFound === 0;
    const color = safe ? '#4caf50' : '#EAB308';
    html += `<div style="background:#0d0d0d;border:1px solid #222;border-radius:6px;padding:10px">`;
    html += `<div style="font-size:10px;color:#555;text-transform:uppercase;letter-spacing:0.05em;font-family:var(--mono);margin-bottom:6px">Serverless Compat</div>`;
    html += `<div style="font-size:12px;font-family:var(--mono);color:${color}">${safe ? '✓ No in-memory state' : `⚠ ${sc.inMemoryStateFound} in-memory stores`}</div>`;
    html += `<div style="font-size:10px;font-family:var(--mono);color:#666;margin-top:4px">${sc.platform || 'unknown platform'}</div>`;
    if (sc.details && sc.details.length > 0) {
      sc.details.forEach(d => {
        html += `<div style="font-size:10px;font-family:var(--mono);color:#ccaa66;margin-top:2px">· ${d}</div>`;
      });
    }
    html += `</div>`;
  }

  // Route pattern consistency
  if (rc && rc.routesSampled > 0) {
    const issues = [];
    if (!rc.authPatternConsistent) issues.push('auth');
    if (!rc.errorPatternConsistent) issues.push('errors');
    if (!rc.validationPatternConsistent) issues.push('validation');
    const safe = issues.length === 0;
    const color = safe ? '#4caf50' : '#EAB308';
    html += `<div style="background:#0d0d0d;border:1px solid #222;border-radius:6px;padding:10px">`;
    html += `<div style="font-size:10px;color:#555;text-transform:uppercase;letter-spacing:0.05em;font-family:var(--mono);margin-bottom:6px">Route Consistency</div>`;
    html += `<div style="font-size:12px;font-family:var(--mono);color:${color}">${safe ? '✓ All consistent' : `⚠ Inconsistent: ${issues.join(', ')}`}</div>`;
    html += `<div style="font-size:10px;font-family:var(--mono);color:#666;margin-top:4px">${rc.routesSampled} routes sampled</div>`;
    if (rc.inconsistencies && rc.inconsistencies.length > 0) {
      rc.inconsistencies.forEach(i => {
        html += `<div style="font-size:10px;font-family:var(--mono);color:#ccaa66;margin-top:2px">· ${i}</div>`;
      });

  html += `</div>`;

  // Supply chain row
  if (su) {
    const envTracked = su.envTrackedByGit && su.envTrackedByGit.length > 0;
    const installScripts = su.prodDepsWithInstallScripts && su.prodDepsWithInstallScripts.length > 0;
    if (envTracked || installScripts) {
      html += `<div style="display:flex;gap:12px;margin-top:8px;flex-wrap:wrap">`;

      }

        html += `<div style="font-size:11px;font-family:var(--mono);color:#EAB308">⚠ ${su.prodDepsWithInstallScripts.length} deps with install scripts</div>`;
      }
      html += `</div>`;
    }
  }

  // Formatting row
  if (fm) {
    const clean = fm.prettierClean && fm.prettierConfigFound;
    const color = clean ? '#4caf50' : fm.prettierConfigFound ? '#EAB308' : '#666';
    const label = clean ? '✓ Prettier clean' : fm.prettierConfigFound ? `⚠ ${fm.filesNeedingFormat} files need formatting` : '— No Prettier config';
    html += `<div style="font-size:11px;font-family:var(--mono);color:${color};margin-top:8px">${label}</div>`;
  }

  html += `</div>`;
  return html;
}

// Global flag store — avoids inline JSON.parse in onclick which breaks on special characters
const _flagStore = {};
let _flagId = 0;
function storeFlagObj(f) {
  const id = '_f' + (_flagId++);
  _flagStore[id] = f;
  return id;
}
function getFlagObj(id) {
  return _flagStore[id] || null;
}

function flagsHTML(flags, scanned, appName) {
  if (!scanned) return '';
  if (!flags || flags.length === 0) return `<div class="flags-section"><div class="section-label">Flags</div><div class="no-flags">✓ No flags</div></div>`;

  const activeFlags = flags.filter(f => !isAccepted(f) && !isResolved(f));
  const acceptedFlags = flags.filter(f => isAccepted(f));
  const resolvedFlags = flags.filter(f => isResolved(f));

  if (activeFlags.length === 0 && acceptedFlags.length === 0 && resolvedFlags.length === 0) return `<div class="flags-section"><div class="section-label">Flags</div><div class="no-flags">✓ No flags</div></div>`;

  const parts = [];
  if (activeFlags.length > 0) parts.push(`${activeFlags.length} active`);
  if (acceptedFlags.length > 0) parts.push(`${acceptedFlags.length} accepted`);
  if (resolvedFlags.length > 0) parts.push(`${resolvedFlags.length} resolved`);
  let html = `<div class="flags-section"><div class="section-label">Flags (${parts.join(', ')})</div>`;

  if (activeFlags.length === 0) {
    html += `<div class="no-flags">✓ No active flags</div>`;
  } else {
    const sorted = [...activeFlags].sort((a, b) => {
      const order = { P1: 0, P2: 1, P3: 2, P4: 3 };
      return (order[classifyFlag(a)] ?? 4) - (order[classifyFlag(b)] ?? 4);
    });
    html += sorted.map(f => {
      const text = getFlagText(f);
      const sev = classifyFlag(f);
      const cat = (typeof f === "object" && f.category) ? f.category : '';
      const sevClass = sev === "P1" ? "flag-critical" : sev === "P2" ? "flag-high" : sev === "P3" ? "flag-warning" : "flag-info";
      const badgeClass = sev === "P1" ? "severity-P1" : sev === "P2" ? "severity-P2" : sev === "P3" ? "severity-P3" : "severity-P4";
      const sevLabel = sev === "P1" ? "P1 Critical" : sev === "P2" ? "P2 High" : sev === "P3" ? "P3 Medium" : "P4 Low";
      const escaped = text.replace(/'/g, "\\'").replace(/"/g, "&quot;");
      const fid = storeFlagObj(f);
      const age = flagAgeBadge(appName, cat);
      return `<div class="flag-item ${sevClass}" onclick="event.stopPropagation();showFlagModal('${escaped}','${cat}',getFlagObj('${fid}'))"><span class="flag-icon">⚠</span><span>${escHtml(text)}<span class="severity-badge ${badgeClass}">${sevLabel}</span>${age}</span></div>`;
    }).join("");
  }

  if (acceptedFlags.length > 0) {
    html += `<div style="margin-top:12px;padding-top:10px;border-top:1px solid #222"><div class="section-label" style="color:#555">Accepted / Won't Fix</div>`;
    html += acceptedFlags.map(f => {
      const cat = f.category || '';
      const escaped = f.text.replace(/'/g, "\\'").replace(/"/g, "&quot;");
      const fid = storeFlagObj(f);
      return `<div class="flag-item flag-accepted" onclick="event.stopPropagation();showFlagModal('${escaped}','${cat}',getFlagObj('${fid}'))"><span class="flag-icon" style="color:#555">○</span><span>${escHtml(f.text)}<span class="severity-badge severity-accepted">accepted</span>${f.note ? `<div class="flag-accepted-note">${escHtml(f.note)}</div>` : ''}</span></div>`;
    }).join("");
    html += `</div>`;
  }

  if (resolvedFlags.length > 0) {
    html += `<div style="margin-top:12px;padding-top:10px;border-top:1px solid #222"><div class="section-label" style="color:#4a7a4a">Resolved</div>`;
    html += resolvedFlags.map(f => {
      const cat = f.category || '';
      const escaped = f.text.replace(/'/g, "\\'").replace(/"/g, "&quot;");
      const fid = storeFlagObj(f);
      return `<div class="flag-item flag-resolved" onclick="event.stopPropagation();showFlagModal('${escaped}','${cat}',getFlagObj('${fid}'))"><span class="flag-icon" style="color:#4a7a4a">✓</span><span>${escHtml(f.text)}<span class="severity-badge severity-resolved">resolved</span></span></div>`;
    }).join("");
    html += `</div>`;
  }

  html += `</div>`;
  return html;
}

let openChangelog = null;
function toggleChangelog(id) {
  event.stopPropagation();
  openChangelog = openChangelog === id ? null : id;
  const body = document.getElementById("changelog-body-" + id);
  const toggle = document.getElementById("changelog-toggle-" + id);
  if (!body || !toggle) return;
  if (body.style.display === "none" || !body.style.display) {
    body.style.display = "block";
    toggle.textContent = toggle.textContent.replace("▸", "▾");
  } else {
    body.style.display = "none";
    toggle.textContent = toggle.textContent.replace("▾", "▸");
  }
}

function changelogHTML(changelog, idx) {
  if (!changelog || changelog.length === 0) return '';
  const grouped = {};
  changelog.forEach(e => {
    if (!grouped[e.date]) grouped[e.date] = [];
    grouped[e.date].push(e.text);
  });
  const dates = Object.keys(grouped).sort((a, b) => b.localeCompare(a));
  let html = `<div class="changelog-section">`;
  html += `<div class="changelog-toggle" id="changelog-toggle-${idx}" onclick="toggleChangelog(${idx})">▸ Changelog (${changelog.length})</div>`;
  html += `<div class="changelog-body" id="changelog-body-${idx}">`;
  dates.forEach(date => {
    html += `<div class="changelog-date-group"><div class="changelog-date">${date}</div>`;
    grouped[date].forEach(text => {
      html += `<div class="changelog-entry"><span class="changelog-icon">•</span><span>${text}</span></div>`;
    });
    html += `</div>`;
  });
  html += `</div></div>`;
  return html;
}

function priorityBadge(app) {
  if (!app.scanned) return '<span class="priority-score priority-none">—</span>';
  const score = getFlagScore(app.flags);
  const crit = getCriticalCount(app.flags);
  if (crit >= 3 || score >= 10) return `<span class="priority-score priority-high">🔴 ${score.toFixed(0)}pts</span>`;
  if (crit >= 1 || score >= 4) return `<span class="priority-score priority-med">🟡 ${score.toFixed(0)}pts</span>`;
  if (score > 0) return `<span class="priority-score priority-low">🟢 ${score.toFixed(0)}pts</span>`;
  return '<span class="priority-score priority-low">✓</span>';
}

// Three-pip coverage indicator: ESLint / Prettier / Lint gate (Stop hook).
// Reads window.PORTFOLIO_STATS populated by data/portfolio-stats.js.
function coverageBadge(app) {
  const stats = (window.PORTFOLIO_STATS && window.PORTFOLIO_STATS.byName && window.PORTFOLIO_STATS.byName[app.name]) || null;
  if (!stats || !stats.coverage) return '';
  const c = stats.coverage;
  const pip = on => `<span class="cov-pip cov-pip-${on ? 'on' : 'off'}"></span>`;
  const tip = `ESLint: ${c.eslint ? 'yes' : 'no'} · Prettier: ${c.prettier ? 'yes' : 'no'} · Stop-hook lint gate: ${c.lintGate ? 'yes' : 'no'}`;
  return `<span class="cov-pips" title="${tip}">${pip(c.eslint)}${pip(c.prettier)}${pip(c.lintGate)}</span>`;
}

// Compute days a flag has been open, from window.PORTFOLIO_STATS.flagAges.
// Returns null if no record (treat as fresh / unknown).
function flagAgeDays(appName, category) {
  const ages = window.PORTFOLIO_STATS && window.PORTFOLIO_STATS.flagAges;
  if (!ages || !appName || !category) return null;
  const firstSeen = ages[`${appName}|${category}`];
  if (!firstSeen) return null;
  const ms = Date.now() - new Date(firstSeen).getTime();
  return Math.max(0, Math.round(ms / 86400000));
}

// Render the age tag — hidden if < 7 days (everything is fresh after a scan).
function flagAgeBadge(appName, category) {
  const days = flagAgeDays(appName, category);
  if (days == null || days < 7) return '';
  const cls = days >= 30 ? 'flag-age-stale' : days >= 14 ? 'flag-age-old' : 'flag-age-fresh';
  return `<span class="flag-age-badge ${cls}" title="First seen ${days} days ago — flag is becoming stale tech debt">${days}d</span>`;
}

// Flag burndown across portfolio — line chart from window.PORTFOLIO_STATS.burndown.
// Filters to "full scan" dates (>= 15 projects scanned) so single-project rescans
// don't show as outliers. Returns "" if not enough data points yet.
function renderBurndownChart() {
  const data = window.PORTFOLIO_STATS && window.PORTFOLIO_STATS.burndown;
  if (!data || !data.dates || data.dates.length < 2) return '';
  const validIdx = data.projectCounts.map((c, i) => c >= 15 ? i : -1).filter(i => i >= 0);
  if (validIdx.length < 2) return '';
  const dates = validIdx.map(i => data.dates[i]);
  const series = {
    P1: validIdx.map(i => data.series.P1[i]),
    P2: validIdx.map(i => data.series.P2[i]),
    P3: validIdx.map(i => data.series.P3[i]),
    P4: validIdx.map(i => data.series.P4[i]),
  };
  const colors = { P1: '#ff6666', P2: '#ff9933', P3: '#e8c547', P4: '#888' };
  const W = 760, H = 220, padL = 50, padR = 20, padT = 20, padB = 30;
  const innerW = W - padL - padR, innerH = H - padT - padB;
  const maxVal = Math.max(10, Math.ceil(Math.max(...Object.values(series).flat()) * 1.1));
  const xAt = (i, total) => padL + (total <= 1 ? 0 : (i / (total - 1)) * innerW);
  const yAt = v => padT + innerH - (v / maxVal) * innerH;
  let lines = '', dots = '';
  for (const [sev, vals] of Object.entries(series)) {
    const points = vals.map((v, i) => `${xAt(i, vals.length)},${yAt(v)}`).join(' ');
    lines += `<polyline points="${points}" stroke="${colors[sev]}" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>`;
    vals.forEach((v, i) => {
      dots += `<circle cx="${xAt(i, vals.length)}" cy="${yAt(v)}" r="4" fill="${colors[sev]}" stroke="#0a0a0a" stroke-width="2"><title>${sev} on ${dates[i]}: ${v} active flags</title></circle>`;
    });
  }
  let grid = '';
  const ySteps = 4;
  for (let s = 0; s <= ySteps; s++) {
    const v = Math.round((maxVal / ySteps) * s);
    const y = yAt(v);
    grid += `<line x1="${padL}" x2="${W - padR}" y1="${y}" y2="${y}" stroke="#222" stroke-dasharray="2,4"/>`;
    grid += `<text x="${padL - 6}" y="${y + 3}" fill="#666" font-size="10" text-anchor="end" font-family="var(--mono)">${v}</text>`;
  }
  let xLabels = '';
  dates.forEach((d, i) => {
    const x = xAt(i, dates.length);
    xLabels += `<text x="${x}" y="${H - 10}" fill="#888" font-size="10" text-anchor="middle" font-family="var(--mono)">${d}</text>`;
  });
  const totalNow = Object.values(series).reduce((s, arr) => s + arr[arr.length - 1], 0);
  const totalThen = Object.values(series).reduce((s, arr) => s + arr[0], 0);
  const delta = totalThen - totalNow;
  const deltaTxt = delta > 0
    ? `<span style="color:#4caf50">↓ ${delta} resolved since ${dates[0]}</span>`
    : delta < 0
    ? `<span style="color:#ff6666">↑ ${-delta} new since ${dates[0]}</span>`
    : `<span style="color:#888">no change since ${dates[0]}</span>`;
  const legend = Object.entries(colors).map(([sev, color]) =>
    `<span style="display:inline-flex;align-items:center;gap:6px;font-family:var(--mono);font-size:11px;color:#bbb;margin-right:14px"><span style="display:inline-block;width:14px;height:2px;background:${color};border-radius:1px"></span>${sev}: ${series[sev][series[sev].length - 1]} active</span>`
  ).join('');
  const lastProjectCount = data.projectCounts[validIdx[validIdx.length - 1]];
  return `<div class="insight-panel" style="grid-column: 1 / -1; margin: 16px 0;">
    <div class="insight-panel-title" style="color:#5b9bd5">📉 Flag Burndown Across Portfolio</div>
    <div style="margin-bottom:10px;font-size:12px;color:#aaa">
      <strong style="color:#fff;font-size:16px;font-family:var(--mono)">${totalNow}</strong> active flags now ${deltaTxt}
      <span style="color:#666;margin-left:10px">${lastProjectCount} projects scanned · ${dates.length} data points</span>
    </div>
    <svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid meet" style="width:100%;height:auto;max-height:240px;display:block">
      ${grid}
      ${lines}
      ${dots}
      ${xLabels}
    </svg>
    <div style="margin-top:8px;display:flex;flex-wrap:wrap">${legend}</div>
  </div>`;
}

// CLAUDE.md adherence: hand-curated line count, color-coded against the
// 80-line target from the May 2026 research synthesis (200→35 = 79%→97% adherence).
function claudeMdBadge(app) {
  const stats = (window.PORTFOLIO_STATS && window.PORTFOLIO_STATS.byName && window.PORTFOLIO_STATS.byName[app.name]) || null;
  if (!stats || !stats.claudeMd) return '<span class="claude-md-pill claude-md-none" title="No CLAUDE.md detected">📄 —</span>';
  const hand = stats.claudeMd.handCurated;
  const total = stats.claudeMd.total;
  const cls = hand <= 80 ? 'claude-md-good' : hand <= 200 ? 'claude-md-warn' : 'claude-md-bad';
  const tip = `CLAUDE.md hand-curated: ${hand} lines (target ≤ 80) · total ${total} (incl. SCAN:AUTO block)`;
  return `<span class="claude-md-pill ${cls}" title="${tip}">📄 ${hand}L</span>`;
}

// Ordered list of icon sources to try, best first:
//  1. self-hosted icon under the dashboard's own /icons/ (immune to the app being offline)
//  2. the icon path resolved against the app's live URL
//  3. a favicon pulled from the app's domain via DuckDuckGo's icon service — but ONLY as a
//     fallback when an icon is declared. Apps with no icon.src fall straight to the placeholder
//     rather than showing DDG's generic globe (which would imply a dead app has a real icon).
function iconCandidates(app) {
  const c = [];
  if (app.icon && app.icon.src) {
    const s = app.icon.src;
    if (/^\/?icons\//.test(s)) {
      c.push(s.replace(/^\//, '')); // local, served from this dashboard — do NOT resolve against app.url
    } else {
      c.push(app.url ? new URL(s, app.url).href : s);
    }
    if (app.url) {
      try { c.push('https://icons.duckduckgo.com/ip3/' + new URL(app.url).hostname + '.ico'); } catch (e) {}
    }
  }
  return c;
}

// Walk to the next candidate on load failure; show the placeholder once exhausted.
function iconFallback(img) {
  let cands = [];
  try { cands = JSON.parse(img.dataset.cands || '[]'); } catch (e) {}
  const next = parseInt(img.dataset.i || '0', 10) + 1;
  if (next < cands.length) {
    img.dataset.i = String(next);
    img.src = cands[next];
  } else {
    img.onerror = null;
    img.style.display = 'none';
    if (img.nextElementSibling) img.nextElementSibling.style.display = 'flex';
  }
}

function renderIcon(app) {
  if (app.icon && app.icon.src) {
    // Build the full URL for deployed apps or relative path for local
    const iconUrl = app.url ? new URL(app.icon.src, app.url).href : app.icon.src;
    return `<img class="card-icon" src="${iconUrl}" alt="${escHtml(app.name)} icon" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"><div class="card-icon-placeholder" style="display:none">📱</div>`;
  }
  return `<div class="card-icon-placeholder">📱</div>`;
}

// ===== Health grade (v7.0) =====
// The formula lives in scans/grade-model.js (single source shared with
// generate-portfolio-stats.js, which persists per-cycle scores into
// PORTFOLIO_STATS.gradeHistory for the trend arrows).
function healthGradeFor(app) {
  const r = window.HEALTH_GRADE.scoreFor(app);
  if (!r) return null;
  return { score: r.score, letter: window.HEALTH_GRADE.letterFor(r.score), parts: r.parts };
}

function gradeColor(score) {
  return window.HEALTH_GRADE.colorFor(score);
}

// Score delta vs the prior recorded cycle, or null when fewer than two cycles exist.
function gradeTrendFor(app) {
  const hist = (window.PORTFOLIO_STATS && window.PORTFOLIO_STATS.gradeHistory && window.PORTFOLIO_STATS.gradeHistory[app.name]) || [];
  if (hist.length < 2) return null;
  const cur = hist[hist.length - 1].score, prev = hist[hist.length - 2].score;
  if (cur === prev) return null;
  return { delta: cur - prev, prev, cur };
}

function gradeTrendArrow(app) {
  const t = gradeTrendFor(app);
  if (!t) return "";
  const up = t.delta > 0;
  return `<span title="${up ? "+" : ""}${t.delta} vs prior scan (${t.prev} → ${t.cur})" style="color:${up ? "#4caf50" : "#ff6666"}">${up ? "▲" : "▼"}</span>`;
}

// Health ring — same visual language as the completion ring, letter centered,
// arc fills to score/100, colored by grade. Click → breakdown modal.
function healthRingSVG(app) {
  const g = healthGradeFor(app);
  if (!g) return `<div class="ring-col"><span class="ring-na">—</span><span class="ring-label">health</span></div>`;
  const size = 44, r = (size - 6) / 2, circ = 2 * Math.PI * r;
  const offset = circ - (g.score / 100) * circ;
  const c = gradeColor(g.score);
  return `<div class="ring-col health-ring" title="Health grade ${g.letter} (${g.score}/100) — click for breakdown" onclick="event.stopPropagation();showGradeModal(${(window.APPS || []).indexOf(app)})">
    <svg class="ring" width="${size}" height="${size}">
      <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="#2a2a2a" stroke-width="3"/>
      <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${c}" stroke-width="3"
        stroke-dasharray="${circ}" stroke-dashoffset="${offset}" stroke-linecap="round"
        transform="rotate(-90 ${size/2} ${size/2})" style="transition:stroke-dashoffset 0.6s ease"/>
      <text x="${size/2}" y="${size/2 + 1}" text-anchor="middle" dominant-baseline="middle"
        fill="${c}" font-size="13" font-weight="700" font-family="var(--mono)">${g.letter}</text>
    </svg>
    <span class="ring-label">health ${gradeTrendArrow(app)}</span>
  </div>`;
}

function showGradeModal(idx) {
  const app = (window.APPS || [])[Number(idx)];
  if (!app) return;
  const g = healthGradeFor(app);
  if (!g) return;
  document.getElementById('flag-modal-title').textContent = `Health Grade: ${g.letter} (${g.score}/100)`;
  document.getElementById('flag-modal-flag').textContent = `${app.name} — composite computed from the latest scan's data; updates automatically as flags resolve and scans refresh.`;
  const sevEl = document.getElementById('flag-modal-severity');
  sevEl.textContent = g.letter;
  sevEl.className = 'flag-modal-severity ' + (g.score >= 80 ? 'severity-P4' : g.score >= 60 ? 'severity-P3' : 'severity-P1');
  document.getElementById('flag-modal-what').textContent =
    "Start at 100 and subtract: 30 per active P1, 10 per P2, 2 per P3, 0.5 per P4 (P4 capped at −3); 1.5 per file over 1,500 lines (capped at −5); −6 with no test framework; −5 when the last scan is over 45 days old. Accepted and resolved flags don't count — accepting a risk is a decision, not a defect.";
  const exampleEl = document.getElementById('flag-modal-example');
  if (exampleEl) {
    exampleEl.style.display = 'block';
    const t = gradeTrendFor(app);
    const trendLine = t ? `\n\nTrend: ${t.delta > 0 ? "+" : ""}${t.delta} vs prior scan (${t.prev} → ${t.cur})` : "";
    exampleEl.textContent = (g.parts.length ? "This app's deductions:\n" + g.parts.join("\n") : "No deductions — clean scan.") + trendLine;
  }
  const fixEl = document.getElementById('flag-modal-fix');
  if (fixEl) {
    fixEl.style.display = 'block';
    fixEl.textContent = "Raise the grade by resolving flags (biggest deduction first), accepting risks that are genuinely fine (accepted flags don't deduct), splitting oversized files, adding a test framework, or rescanning if the data is stale.";
  }
  const exploitEl = document.getElementById('flag-modal-exploit');
  if (exploitEl) exploitEl.style.display = 'none';
  const confidenceEl = document.getElementById('flag-modal-confidence');
  if (confidenceEl) confidenceEl.style.display = 'none';
  document.getElementById('flag-modal-overlay').classList.add('active');
}
