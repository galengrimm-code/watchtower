// Minimal HTML-escape for scalar values interpolated into the export report.
function escHtml(s) {
  return String(s == null ? '' : s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

// Build a clean, light-themed report from an app's data and open the browser's
// print dialog (Save as PDF). Reuses the same section helpers the card uses, so
// the export never drifts from what's on screen. The @media print stylesheet
// recolors the dark sub-cards to an ink-friendly light layout. Resolved by APPS
// index (not name) so the click target is unambiguous and nothing user-derived
// is interpolated into the inline handler.
let _pdfReportEl = null;
function exportAppPdf(idx) {
  const app = (window.APPS || [])[Number(idx)];
  if (!app) return;
  if (!_pdfReportEl) {
    _pdfReportEl = document.createElement('div');
    _pdfReportEl.id = 'pdf-report';
    document.body.appendChild(_pdfReportEl);
  }
  const meta = [];
  if (app.url) meta.push(`<div>Live: ${escHtml(app.url)}</div>`);
  if (app.repoUrl) meta.push(`<div>Repo: ${escHtml(app.repoUrl)}</div>`);
  if (app.repoVisibility) meta.push(`<div>Repo visibility: ${escHtml(app.repoVisibility)}</div>`);
  if (app.lastUpdated) meta.push(`<div>Last updated: ${escHtml(app.lastUpdated)}</div>`);
  if (app.lastScanned) meta.push(`<div>Last scanned: ${escHtml(app.lastScanned)}</div>`);
  const completion = (app.completion ?? null) === null ? '—' : app.completion + '%';
  const today = new Date().toISOString().slice(0, 10);
  const styleVars = categoryStyleVars(app.category);
  const header = `
    <div class="pdf-top" style="${styleVars}">
      ${renderIcon(app)}
      <div class="pdf-head-info">
        <div class="pdf-h1">${escHtml(app.name)}</div>
        <div class="pdf-tags">
          <span class="card-tag">${escHtml(app.category)}</span>
          ${priorityBadge(app)}
          ${coverageBadge(app)}
          <span class="pdf-status">${completion} complete · ${app.scanned ? 'scanned' : 'not yet scanned'}</span>
        </div>
        <div class="pdf-desc">${escHtml(app.description)}</div>
      </div>
      ${app.completion != null ? ringSVG(app.completion) : ''}
      ${healthRingSVG(app)}
    </div>
    <div class="pdf-meta">${meta.join('')}</div>
    ${app.nextAction ? `<div class="env-section"><div class="section-label">Next Action</div><div>${escHtml(app.nextAction)}</div></div>` : ''}`;
  _pdfReportEl.innerHTML = header
    + strengthsHTML(app.strengths)
    + techHTML(app.tech || {})
    + envHTML(app.envSecrets)
    + metricsHTML(app.metrics)
    + securityPostureHTML(app.securityPosture)
    + deployedSurfaceHTML(app.deployedSurface)
    + operationalHealthHTML(app)
    + flagsHTML(app.flags, app.scanned, app.name)
    + changelogHTML(app.changelog, 'pdf')
    + `<div class="pdf-foot">Generated by Watch Tower · ${today}</div>`;
  window.print();
}

function sortApps(apps) {
  const arr = [...apps];
  // Archived apps always sink to the bottom regardless of sort mode,
  // and we never let them affect dashboard stats. Within each group
  // (non-archived, archived) the chosen sort still applies.
  const cmp = (a, b) => {
    switch (currentSort) {
      case "flags":
        return getFlagScore(b.flags) - getFlagScore(a.flags);
      case "critical": {
        const ca = getCriticalCount(a.flags), cb = getCriticalCount(b.flags);
        if (cb !== ca) return cb - ca;
        return getFlagScore(b.flags) - getFlagScore(a.flags);
      }
      case "completion":
        return (a.completion ?? 999) - (b.completion ?? 999);
      case "mostComplete":
        return (b.completion ?? -1) - (a.completion ?? -1);
      case "grade": {
        // Worst grade first; ungraded apps sink to the bottom.
        const ga = healthGradeFor(a), gb = healthGradeFor(b);
        return (ga ? ga.score : 999) - (gb ? gb.score : 999);
      }
      default:
        return 0;
    }
  };
  return arr.sort((a, b) => {
    // Categories with the highest sortOrder sink to the bottom (matches the
    // legacy "Archived last" behavior when categories.Archived.sortOrder = 99).
    const aa = categorySortOrder(a.category) >= 99 ? 1 : 0;
    const ab = categorySortOrder(b.category) >= 99 ? 1 : 0;
    if (aa !== ab) return aa - ab;
    return cmp(a, b);
  });
}

let openStatDetail = null;
function toggleStatDetail(type) {
  const panels = ["critical", "high", "other", "active", "aienv", "scanned", "velocity", "gpa"];
  if (openStatDetail === type) {
    panels.forEach(p => {
      const el = document.getElementById("stat-detail-" + p);
      if (el) el.style.display = "none";
      const card = document.getElementById("stat-card-" + p);
      if (card) card.classList.remove("active");
    });
    openStatDetail = null;
  } else {
    panels.forEach(p => {
      const el = document.getElementById("stat-detail-" + p);
      if (el) el.style.display = p === type ? "block" : "none";
      const card = document.getElementById("stat-card-" + p);
      if (card) card.classList.toggle("active", p === type);
    });
    openStatDetail = type;
  }
}

function toggleCard(idx) {
  const sel = window.getSelection();
  if (sel && sel.toString().length > 0) return;
  expandedCard = expandedCard === idx ? null : idx;
  render();
}

function setFilter(cat) {
  currentFilter = cat;
  expandedCard = null;
  render();
}

function setSort(sort) {
  currentSort = currentSort === sort ? "default" : sort;
  expandedCard = null;
  render();
}

let openDetail = null;
function toggleDetail(id) {
  openDetail = openDetail === id ? null : id;
  const el = document.getElementById("detail-" + id);
  if (!el) return;
  el.style.display = el.style.display === "none" ? "block" : "none";
}

function metricRow(label, count, color, id, appNames) {
  if (!appNames || appNames.length === 0) {
    return `<div class="insight-row"><span>${label}</span><span class="insight-row-val" style="color:${color}">${count}</span></div>`;
  }
  return `<div class="insight-row clickable" onclick="toggleDetail('${id}')"><span>${label}</span><span class="insight-row-val" style="color:${color}">${count}</span></div><div id="detail-${id}" class="insight-detail" style="display:none">${appNames.join("<br>")}</div>`;
}

// Surface Phase 0.5 sync problems from the last scan as a dismissible banner, so a
// scan that ran against stale local code never silently reads as a clean audit.
// Reads the repo-sync-stale / repo-sync-skipped-dirty flags Phase B appends per project.
function syncBannerHTML() {
  const stale = [], dirty = [];
  (window.APPS || []).forEach(a => {
    let s = false, d = false;
    (a.flags || []).forEach(f => {
      const cat = (f && typeof f === 'object' && f.category) || '';
      if (cat === 'repo-sync-stale') s = true;
      else if (cat === 'repo-sync-skipped-dirty') d = true;
    });
    if (s) stale.push(a.name);
    if (d) dirty.push(a.name);
  });
  if (!stale.length && !dirty.length) return '';
  const parts = [];
  if (stale.length) parts.push(`<b>${stale.length} couldn't sync</b> (diverged / no upstream — possibly a failed prior push): ${stale.map(escHtml).join(', ')}`);
  if (dirty.length) parts.push(`<b>${dirty.length} had uncommitted local changes</b>: ${dirty.map(escHtml).join(', ')}`);
  return `<div class="sync-banner">
    <span class="sync-banner-icon">⚠</span>
    <div class="sync-banner-body">
      <div class="sync-banner-title">Last scan ran against possibly-stale local code</div>
      <div class="sync-banner-detail">${parts.join(' · ')}</div>
    </div>
    <button class="sync-banner-dismiss" title="Dismiss" onclick="this.closest('.sync-banner').remove()">✕</button>
  </div>`;
}

function render() {
  let filtered = currentFilter === "All" ? [...APPS] : APPS.filter(a => a.category === currentFilter);
  filtered = sortApps(filtered);

  // Header "Updated <date>" — pick the most recent lastUpdated or lastScanned
  // across the whole portfolio. Anything touching an APPS entry refreshes this.
  const headerUpdatedEl = document.getElementById("header-updated");
  if (headerUpdatedEl) {
    const dateStrs = APPS.flatMap(a => [a.lastUpdated, a.lastScanned].filter(Boolean));
    if (dateStrs.length > 0) {
      const max = dateStrs.sort().slice(-1)[0]; // ISO YYYY-MM-DD sorts lexicographically
      const d = new Date(max + "T00:00:00Z");
      const months = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
      headerUpdatedEl.textContent = `${months[d.getUTCMonth()]} ${d.getUTCDate()}, ${d.getUTCFullYear()}`;
    } else {
      headerUpdatedEl.textContent = "—";
    }
  }

  // Burndown chart sits between stats and the toggleable insight panels — always visible.
  const burndownEl = document.getElementById("panel-burndown");
  if (burndownEl) burndownEl.innerHTML = renderBurndownChart();

  const _syncBanner = document.getElementById("sync-banner-mount");
  if (_syncBanner) _syncBanner.innerHTML = syncBannerHTML();

  const TRACKED = APPS.filter(a => !categoryExcludedFromStats(a.category));
  const total = TRACKED.length;
  const withCompletion = TRACKED.filter(a => a.completion != null);
  const avg = Math.round(withCompletion.reduce((s,a) => s + a.completion, 0) / withCompletion.length);
  const totalFlags = TRACKED.reduce((s,a) => s + (a.flags ? a.flags.filter(f => !isAccepted(f) && !isResolved(f)).length : 0), 0);
  const p1Flags = TRACKED.reduce((s,a) => s + getCountByTier(a.flags, "P1"), 0);
  const p2Flags = TRACKED.reduce((s,a) => s + getCountByTier(a.flags, "P2"), 0);
  const p3Flags = TRACKED.reduce((s,a) => s + getCountByTier(a.flags, "P3"), 0);
  const p4Flags = TRACKED.reduce((s,a) => s + getCountByTier(a.flags, "P4"), 0);
  const critFlags = p1Flags;
  const acceptedTotal = TRACKED.reduce((s,a) => s + (a.flags ? a.flags.filter(f => isAccepted(f)).length : 0), 0);
  const scanned = TRACKED.filter(a => a.scanned).length;

  const critColor = p1Flags > 0 ? "#ff4444" : "#4caf50";
  const highColor = p2Flags > 0 ? "#F97316" : "#4caf50";
  const otherColor = (p3Flags + p4Flags) > 0 ? "#EAB308" : "#4caf50";

  // AI Env stat — counts global AI tool flags from window.AI_TOOL_INTEL plus
  // any per-app flag whose category begins with "ai-".
  const intel = getAiIntel();
  const globalAiFlags = (intel.flags || []).filter(f => !isAccepted(f) && !isResolved(f));
  const perAppAiFlags = TRACKED.reduce((acc, a) => {
    if (!a.flags) return acc;
    a.flags.forEach(f => {
      const cat = (typeof f === "object" && f.category) ? f.category : "";
      if (cat.startsWith("ai-") && !isAccepted(f) && !isResolved(f)) acc.push({ app: a.name, flag: f });
    });
    return acc;
  }, []);
  const aiFlagCount = globalAiFlags.length + perAppAiFlags.length;
  const dbStale = intel.threatDb && intel.threatDb.daysOld != null && intel.threatDb.daysOld > 30;
  const ccStale = intel.claudeCode && intel.claudeCode.upToDate === false;
  const aiHasP1 = globalAiFlags.some(f => classifyFlag(f) === "P1") || perAppAiFlags.some(x => classifyFlag(x.flag) === "P1");
  const noScanYet = !intel.scannedAt && perAppAiFlags.length === 0;
  let aiColor = "#4caf50";
  if (aiHasP1 || ccStale) aiColor = "#ff4444";
  else if (aiFlagCount > 0 || dbStale) aiColor = "#F97316";
  else if (noScanYet) aiColor = "#777";  // no scan yet AND no per-app AI flags
  const aiDisplay = noScanYet ? "—" : aiFlagCount;

  // Portfolio GPA — mean health score across stats-included graded apps.
  const gradedTracked = TRACKED.map(a => ({ app: a, g: healthGradeFor(a) })).filter(x => x.g);
  const gpaScore = gradedTracked.length ? Math.round(gradedTracked.reduce((s, x) => s + x.g.score, 0) / gradedTracked.length) : null;
  const gpaLetter = gpaScore != null ? window.HEALTH_GRADE.letterFor(gpaScore) : "—";
  const gpaColor = gpaScore != null ? gradeColor(gpaScore) : "#777";

  document.getElementById("stats").innerHTML =
    `<div class="stat-card clickable${openStatDetail === 'critical' ? ' active' : ''}" id="stat-card-critical" onclick="toggleStatDetail('critical')"><div class="stat-value" style="color:${critColor}">${p1Flags}</div><div class="stat-label">P1 Critical</div></div>` +
    `<div class="stat-card clickable${openStatDetail === 'high' ? ' active' : ''}" id="stat-card-high" onclick="toggleStatDetail('high')"><div class="stat-value" style="color:${highColor}">${p2Flags}</div><div class="stat-label">P2 High</div></div>` +
    `<div class="stat-card clickable${openStatDetail === 'other' ? ' active' : ''}" id="stat-card-other" onclick="toggleStatDetail('other')"><div class="stat-value" style="color:${otherColor}">${p3Flags + p4Flags}</div><div class="stat-label">P3/P4 Other</div></div>` +
    `<div class="stat-card clickable${openStatDetail === 'scanned' ? ' active' : ''}" id="stat-card-scanned" onclick="toggleStatDetail('scanned')"><div class="stat-value" style="color:#5b9bd5">${scanned}/${total}</div><div class="stat-label">Scanned</div></div>` +
    `<div class="stat-card clickable${openStatDetail === 'aienv' ? ' active' : ''}" id="stat-card-aienv" onclick="toggleStatDetail('aienv')"><div class="stat-value" style="color:${aiColor}">${aiDisplay}</div><div class="stat-label">🛡️ AI Env</div></div>` +
    (window.CYCLE_STATS ? `<div class="stat-card clickable${openStatDetail === 'velocity' ? ' active' : ''}" id="stat-card-velocity" onclick="toggleStatDetail('velocity')"><div class="stat-value" style="color:#a78bfa">${window.CYCLE_STATS.velocity.commits.toLocaleString()}</div><div class="stat-label">⚡ Velocity</div></div>` : '') +
    `<div class="stat-card clickable${openStatDetail === 'gpa' ? ' active' : ''}" id="stat-card-gpa" onclick="toggleStatDetail('gpa')"><div class="stat-value" style="color:${gpaColor}">${gpaLetter}</div><div class="stat-label">🎓 Portfolio GPA</div></div>`;

  // GPA panel — every graded app ranked worst-first; stats-excluded categories
  // (Archived etc.) listed but dimmed and outside the average.
  const allGraded = APPS.map(a => ({ app: a, g: healthGradeFor(a) })).filter(x => x.g)
    .sort((x, y) => x.g.score - y.g.score);
  const gpaRows = allGraded.map(({ app, g }) => {
    const excluded = categoryExcludedFromStats(app.category);
    const t = gradeTrendFor(app);
    const trend = t ? ` <span style="color:${t.delta > 0 ? '#4caf50' : '#ff6666'};font-size:10px">${t.delta > 0 ? '▲+' + t.delta : '▼' + t.delta}</span>` : '';
    return `<div class="insight-row"${excluded ? ' style="opacity:0.5"' : ''}>` +
      `<span>${escHtml(app.name)}${excluded ? ' <span style="font-size:9px;color:#777">(not in GPA)</span>' : ''}</span>` +
      `<span class="insight-row-val" style="color:${gradeColor(g.score)};font-family:var(--mono)">${window.HEALTH_GRADE.letterFor(g.score)} · ${g.score}${trend}</span></div>`;
  }).join("");
  document.getElementById("stat-detail-gpa").innerHTML =
    `<div class="stat-detail-title" style="color:${gpaColor}">🎓 Portfolio GPA: ${gpaLetter}${gpaScore != null ? ` (${gpaScore}/100 across ${gradedTracked.length} apps)` : ''} — ranked worst-first. Click any app's health ring for its deduction breakdown.</div>` +
    `<div class="stat-detail-group">${gpaRows}</div>`;

  // Build AI Env detail panel
  const aiTitleColor = aiColor === "#4caf50" ? "#4caf50" : aiColor === "#F97316" ? "#F97316" : aiColor === "#ff4444" ? "#ff6666" : "#999";
  let aiDetailBody = "";
  if (noScanYet) {
    aiDetailBody = `<div style="font-size:13px;color:#cca833;font-family:var(--mono);margin-top:8px">⚠ Run weekly-security-scan to populate AI tool intel.</div>`;
  } else {
    if (!intel.scannedAt) {
      // Per-app flags exist but no global scan — show partial-data note
      aiDetailBody += `<div style="font-size:12px;color:#cca833;font-family:var(--mono);margin-bottom:10px;padding:6px 8px;background:rgba(204,168,51,0.08);border-radius:4px">Per-app AI flags below; no global scan yet (skills/MCPs/hooks for ~/.claude/ unaudited).</div>`;
    }
    if (dbStale) aiDetailBody += `<div class="stat-detail-flag"><span style="color:#F97316">⚠</span><span style="color:#fb923c">Threat DB last updated ${intel.threatDb.updated} (${intel.threatDb.daysOld}d ago)</span></div>`;
    if (ccStale) aiDetailBody += `<div class="stat-detail-flag"><span style="color:#ff4444">⚠</span><span style="color:#ff8888">Claude Code ${intel.claudeCode.version} — minimum safe is ${intel.claudeCode.minimumSafe}</span></div>`;
    if (globalAiFlags.length > 0) {
      aiDetailBody += `<div class="stat-detail-group"><div class="stat-detail-app">Claude Code Environment (global)</div>` +
        globalAiFlags.map(f => {
          const sev = classifyFlag(f);
          const color = sev === "P1" ? "#ff8888" : sev === "P2" ? "#F97316" : sev === "P3" ? "#EAB308" : "#888";
          const icon = sev === "P1" ? "🔴" : sev === "P2" ? "🟠" : sev === "P3" ? "🟡" : "🔵";
          return `<div class="stat-detail-flag"><span>${icon}</span><span style="color:${color}">${getFlagText(f)}</span></div>`;
        }).join("") + `</div>`;
    }
    if (perAppAiFlags.length > 0) {
      const grouped = {};
      perAppAiFlags.forEach(x => { (grouped[x.app] = grouped[x.app] || []).push(x.flag); });
      aiDetailBody += Object.keys(grouped).map(app => {
        return `<div class="stat-detail-group"><div class="stat-detail-app">${app}</div>` +
          grouped[app].map(f => {
            const sev = classifyFlag(f);
            const color = sev === "P1" ? "#ff8888" : sev === "P2" ? "#F97316" : sev === "P3" ? "#EAB308" : "#888";
            const icon = sev === "P1" ? "🔴" : sev === "P2" ? "🟠" : sev === "P3" ? "🟡" : "🔵";
            return `<div class="stat-detail-flag"><span>${icon}</span><span style="color:${color}">${getFlagText(f)}</span></div>`;
          }).join("") + `</div>`;
      }).join("");
    }
    // If we have a global scan that's clean, say so
    if (intel.scannedAt && globalAiFlags.length === 0 && perAppAiFlags.length === 0 && !dbStale && !ccStale) {
      aiDetailBody = `<div style="font-size:13px;color:#4caf50;font-family:var(--mono);margin-top:8px">✓ No AI tool flags · DB ${intel.threatDb.daysOld}d old · Claude Code ${intel.claudeCode.version || "?"}</div>`;
    }
  }
  const aiTitleText = noScanYet ? "🛡️ AI Env (not scanned)" : aiFlagCount === 0 && !dbStale && !ccStale ? "🛡️ AI Env — clear" : `🛡️ AI Env Flags (${aiFlagCount})`;
  document.getElementById("stat-detail-aienv").innerHTML =
    `<div class="stat-detail-title" style="color:${aiTitleColor}">${aiTitleText}</div>` + aiDetailBody +
    (intel.scannedAt ? `<div style="margin-top:10px;font-size:11px;color:#555;font-family:var(--mono)">Last AI scan: ${intel.scannedAt} · open Threat Landscape below for campaigns + CVEs</div>` : "");

  // Build Scan Status panel — every project with a scan date, sorted stale-first
  // so the user immediately sees what's overdue. Archived projects show too (they
  // have scan history but are dimmed; date color = staleness vs the 21-day cadence).
  const scannedProjects = APPS
    .filter(a => a.scanned && a.lastScanned)
    .slice()
    .sort((a, b) => (a.lastScanned || "").localeCompare(b.lastScanned || ""));
  const todayUTC = new Date().toISOString().slice(0, 10);
  const daysBetween = (older, newer) => Math.round((new Date(newer) - new Date(older)) / 86400000);
  let scannedDetailBody = "";
  if (scannedProjects.length === 0) {
    scannedDetailBody = `<div style="font-size:13px;color:#999;font-family:var(--mono)">No projects with scan dates yet.</div>`;
  } else {
    const rows = scannedProjects.map(a => {
      const p1 = getCountByTier(a.flags, "P1");
      const p2 = getCountByTier(a.flags, "P2");
      const p3 = getCountByTier(a.flags, "P3");
      const p4 = getCountByTier(a.flags, "P4");
      const days = daysBetween(a.lastScanned, todayUTC);
      const dateColor = days > 30 ? "#ff8888" : days > 21 ? "#fb923c" : "#999";
      const isArchived = a.category === "Archived";
      const archivedTag = isArchived ? ` <span style="color:#666;font-size:10px">(archived)</span>` : "";
      const rowStyle = `border-bottom:1px solid #1f1f1f${isArchived ? ";opacity:0.6" : ""}`;
      const cell = (v, color) => `<td style="padding:6px 8px;text-align:center;color:${v > 0 ? color : '#444'}">${v}</td>`;
      return `<tr style="${rowStyle}">` +
        `<td style="padding:6px 8px;color:#ccc">${a.name}${archivedTag}</td>` +
        cell(p1, "#ff8888") + cell(p2, "#fb923c") + cell(p3, "#cca833") + cell(p4, "#888") +
        `<td style="padding:6px 8px;text-align:right;color:${dateColor};white-space:nowrap">${a.lastScanned} <span style="color:#555;font-size:10px">(${days}d)</span></td>` +
        `</tr>`;
    }).join("");
    scannedDetailBody = `<table style="width:100%;border-collapse:collapse;font-family:var(--mono);font-size:12px">` +
      `<thead><tr style="text-align:left;color:#888;border-bottom:1px solid #2a2a2a">` +
      `<th style="padding:6px 8px">Project</th>` +
      `<th style="padding:6px 8px;text-align:center;width:42px">P1</th>` +
      `<th style="padding:6px 8px;text-align:center;width:42px">P2</th>` +
      `<th style="padding:6px 8px;text-align:center;width:42px">P3</th>` +
      `<th style="padding:6px 8px;text-align:center;width:42px">P4</th>` +
      `<th style="padding:6px 8px;text-align:right">Last Scanned</th>` +
      `</tr></thead><tbody>${rows}</tbody></table>`;
  }
  document.getElementById("stat-detail-scanned").innerHTML =
    `<div class="stat-detail-title" style="color:#5b9bd5">📅 Scan Status — sorted by stalest first (default cadence: ${(window.WATCHTOWER_CONFIG && window.WATCHTOWER_CONFIG.scanCadenceDays) || 21}d)</div>` + scannedDetailBody;

  // Build cycle velocity panel from window.CYCLE_STATS (compute-cycle-stats.js output).
  // Generated per scan cycle; panel and card both disappear gracefully if the file is absent.
  const cs = window.CYCLE_STATS;
  if (cs) {
    const vRow = (label, val) => `<div class="insight-row"><span>${label}</span><span class="insight-row-val" style="color:#a78bfa">${val}</span></div>`;
    const pDelta = tier => {
      const cur = cs.posture.current[tier] || 0, prev = cs.posture.prior[tier] || 0, d = cur - prev;
      const col = d > 0 ? "#ff6666" : d < 0 ? "#4caf50" : "#777";
      const arrow = d > 0 ? `▲+${d}` : d < 0 ? `▼${d}` : "—";
      return `<div class="insight-row"><span>${tier}</span><span class="insight-row-val">${prev} → ${cur} <span style="color:${col}">${arrow}</span></span></div>`;
    };
    document.getElementById("stat-detail-velocity").innerHTML =
      `<div class="stat-detail-title" style="color:#a78bfa">⚡ Cycle Velocity — ${cs.priorDate} → ${cs.scanDate}</div>` +
      `<div class="stat-detail-group"><div class="stat-detail-app">Shipping</div>` +
        vRow("Commits", cs.velocity.commits.toLocaleString()) +
        vRow("Lines", `+${cs.velocity.added.toLocaleString()} / −${cs.velocity.removed.toLocaleString()}`) +
        vRow("Files touched", cs.velocity.filesTouched.toLocaleString()) +
        vRow("Active repos", cs.velocity.activeRepos) +
        vRow("Busiest", `${escHtml(cs.velocity.busiest.name)} (${cs.velocity.busiest.n} commits)`) +
        vRow("Churniest", `${escHtml(cs.velocity.churniest.name)} (${cs.velocity.churniest.n.toLocaleString()} lines)`) +
      `</div>` +
      `<div class="stat-detail-group"><div class="stat-detail-app">Portfolio scale</div>` +
        vRow("Total lines", cs.scale.totalLines.toLocaleString()) +
        vRow("Components / Pages / API routes", `${cs.scale.components} / ${cs.scale.pages} / ${cs.scale.apiRoutes}`) +
        vRow("Files over threshold", `${cs.scale.filesOver500} (largest: ${escHtml(cs.scale.largest.file)}, ${cs.scale.largest.lines.toLocaleString()} lines)`) +
      `</div>` +
      `<div class="stat-detail-group"><div class="stat-detail-app">Flag posture vs prior cycle</div>` +
        pDelta("P1") + pDelta("P2") + pDelta("P3") + pDelta("P4") +
      `</div>` +
      `<div class="stat-detail-group"><div class="stat-detail-app">Highlights</div>` +
        // mostImproved is null on cycles with no net flag reduction (first scan, flat, or worse)
        vRow("Most improved", cs.highlights.mostImproved ? `${escHtml(cs.highlights.mostImproved.name)} (−${cs.highlights.mostImproved.drop})` : "—") +
        // clean = zero P1/P2 only; these apps may still carry P3/P4 flags
        vRow("No P1/P2 flags", cs.highlights.clean.length ? cs.highlights.clean.map(escHtml).join(", ") : "—") +
      `</div>`;
  }

  // Build critical flags detail panel grouped by app
  const critByApp = [];
  TRACKED.forEach(a => {
    if (!a.flags) return;
    const crits = a.flags.filter(f => !isAccepted(f) && !isResolved(f) && classifyFlag(f) === "P1");
    if (crits.length > 0) critByApp.push({ name: a.name, flags: crits });
  });
  document.getElementById("stat-detail-critical").innerHTML = critByApp.length === 0
    ? `<div class="stat-detail-title" style="color:#4caf50">🔴 Critical Flags</div><div style="font-size:13px;color:#4caf50;font-family:var(--mono)">✓ No critical flags</div>`
    : `<div class="stat-detail-title" style="color:#ff6666">🔴 Critical Flags (${critFlags})</div>` +
      critByApp.map(g => `<div class="stat-detail-group"><div class="stat-detail-app">${g.name}</div>${g.flags.map(f => `<div class="stat-detail-flag"><span style="color:#ff4444">⚠</span><span style="color:#ff8888">${getFlagText(f)}</span></div>`).join("")}</div>`).join("");

  // Build P2 high flags detail panel grouped by app
  const highByApp = [];
  TRACKED.forEach(a => {
    if (!a.flags) return;
    const highs = a.flags.filter(f => !isAccepted(f) && !isResolved(f) && classifyFlag(f) === "P2");
    if (highs.length > 0) highByApp.push({ name: a.name, flags: highs });
  });
  document.getElementById("stat-detail-high").innerHTML = highByApp.length === 0
    ? `<div class="stat-detail-title" style="color:#4caf50">🟠 P2 High Flags</div><div style="font-size:13px;color:#4caf50;font-family:var(--mono)">✓ No P2 high flags</div>`
    : `<div class="stat-detail-title" style="color:#F97316">🟠 P2 High Flags (${p2Flags})</div>` +
      highByApp.map(g => `<div class="stat-detail-group"><div class="stat-detail-app">${g.name}</div>${g.flags.map(f => `<div class="stat-detail-flag"><span style="color:#F97316">⚠</span><span style="color:#fb923c">${getFlagText(f)}</span></div>`).join("")}</div>`).join("");

  // Build P3/P4 other flags detail panel grouped by app
  const otherByApp = [];
  TRACKED.forEach(a => {
    if (!a.flags) return;
    const others = a.flags.filter(f => !isAccepted(f) && !isResolved(f) && (classifyFlag(f) === "P3" || classifyFlag(f) === "P4"));
    if (others.length > 0) otherByApp.push({ name: a.name, flags: others });
  });
  const otherTotal = otherByApp.reduce((s, g) => s + g.flags.length, 0);
  document.getElementById("stat-detail-other").innerHTML = otherByApp.length === 0
    ? `<div class="stat-detail-title" style="color:#4caf50">🟡 P3/P4 Flags</div><div style="font-size:13px;color:#4caf50;font-family:var(--mono)">✓ No P3/P4 flags</div>`
    : `<div class="stat-detail-title" style="color:#EAB308">🟡 P3/P4 Flags (${otherTotal})</div>` +
      otherByApp.map(g => `<div class="stat-detail-group"><div class="stat-detail-app">${g.name}</div>${g.flags.map(f => {
        const sev = classifyFlag(f);
        const color = sev === "P3" ? "#EAB308" : "#9CA3AF";
        const icon = sev === "P3" ? "🟡" : "🔵";
        const label = sev === "P3" ? "P3" : "P4";
        return `<div class="stat-detail-flag"><span>${icon}</span><span style="color:${color}">[${label}] ${getFlagText(f)}</span></div>`;
      }).join("")}</div>`).join("");

  // Build active flags detail panel grouped by app
  const activeByApp = [];
  TRACKED.forEach(a => {
    if (!a.flags) return;
    const active = a.flags.filter(f => !isAccepted(f) && !isResolved(f));
    if (active.length > 0) activeByApp.push({ name: a.name, flags: active });
  });
  const activeTotal = activeByApp.reduce((s, g) => s + g.flags.length, 0);
  document.getElementById("stat-detail-active").innerHTML = activeByApp.length === 0
    ? `<div class="stat-detail-title" style="color:#4caf50">⚠ Active Flags</div><div style="font-size:13px;color:#4caf50;font-family:var(--mono)">✓ No active flags</div>`
    : `<div class="stat-detail-title" style="color:#e05555">⚠ Active Flags (${activeTotal})</div>` +
      activeByApp.map(g => `<div class="stat-detail-group"><div class="stat-detail-app">${g.name}</div>${g.flags.map(f => {
        const sev = classifyFlag(f);
        const color = sev === "P1" ? "#ff8888" : sev === "P2" ? "#F97316" : sev === "P3" ? "#EAB308" : "#888";
        const icon = sev === "P1" ? "🔴" : sev === "P2" ? "🟠" : sev === "P3" ? "🟡" : "🔵";
        return `<div class="stat-detail-flag"><span>${icon}</span><span style="color:${color}">${getFlagText(f)}</span></div>`;
      }).join("")}</div>`).join("");

  // Preserve open state after re-render
  if (openStatDetail) {
    document.getElementById("stat-detail-" + openStatDetail).style.display = "block";
  }

  const cats = buildFilterCategories(APPS);

  // ── Insights Panels ──
  const scannedApps = TRACKED.filter(a => a.scanned);

  // Security Posture
  const noAuthApps = scannedApps.filter(a => a.tech && /none/i.test(a.tech.auth || ""));
  const publicWithSecrets = TRACKED.filter(a => a.repoVisibility === "public" && a.flags && a.flags.some(f => {
    const t = getFlagText(f);
    return !isAccepted(f) && (/hardcoded/i.test(t) || /secrets found in git/i.test(t));
  }));
  const publicRepos = TRACKED.filter(a => a.repoVisibility === "public").length;
  const privateRepos = TRACKED.filter(a => a.repoVisibility === "private").length;
  // Only penalize non-accepted critical flags, cap each component so score stays useful
  const nonAcceptedP1 = TRACKED.reduce((s,a) => s + (a.flags ? a.flags.filter(f => !isAccepted(f) && classifyFlag(f) === "P1").length : 0), 0);
  const nonAcceptedP2 = TRACKED.reduce((s,a) => s + (a.flags ? a.flags.filter(f => !isAccepted(f) && classifyFlag(f) === "P2").length : 0), 0);
  const critPenalty = Math.min(40, nonAcceptedP1 * 8 + nonAcceptedP2 * 3);
  const pubSecretPenalty = Math.min(30, publicWithSecrets.length * 15);
  const noAuthPenalty = Math.min(15, noAuthApps.length * 3);
  const securityScore = Math.max(0, Math.round(100 - critPenalty - pubSecretPenalty - noAuthPenalty));

  const noAuthNames = noAuthApps.map(a => a.name);
  const pubSecretNames = publicWithSecrets.map(a => a.name);
  const publicNames = TRACKED.filter(a => a.repoVisibility === "public").map(a => a.name);
  const privateNames = TRACKED.filter(a => a.repoVisibility === "private").map(a => a.name);
  const critApps = TRACKED.filter(a => getCriticalCount(a.flags) > 0).map(a => a.name);
  const notScannedNames = TRACKED.filter(a => !a.scanned).map(a => a.name);

  document.getElementById("panel-security").innerHTML = `
    <div class="insight-panel-title" style="color:#ff6666">🔐 Security Posture</div>
    <div class="insight-row"><span>Security Score</span><span class="insight-row-val" style="color:${securityScore >= 70 ? '#4caf50' : securityScore >= 40 ? '#e0a030' : '#ff4444'}">${securityScore}/100</span></div>
    <div class="insight-bar"><div class="insight-bar-fill" style="width:${securityScore}%;background:${securityScore >= 70 ? '#4caf50' : securityScore >= 40 ? '#e0a030' : '#ff4444'}"></div></div>
    <div style="height:8px"></div>
    ${metricRow("No auth at all", noAuthApps.length + " app" + (noAuthApps.length !== 1 ? "s" : ""), noAuthApps.length > 0 ? "#ff6666" : "#4caf50", "no-auth", noAuthNames)}
    ${metricRow("Public + hardcoded secrets", publicWithSecrets.length, publicWithSecrets.length > 0 ? "#ff6666" : "#4caf50", "pub-secrets", pubSecretNames)}
    ${metricRow("Repos public / private", publicRepos + " / " + privateRepos, "#bbb", "repos", [...publicNames.map(n => "🔓 " + n), ...privateNames.map(n => "🔒 " + n)])}
    ${metricRow("Accepted risks", acceptedTotal, "#777", "accepted", TRACKED.filter(a => a.flags && a.flags.some(f => isAccepted(f))).map(a => a.name))}
  `;

  // Tech Debt
  const missingEnvApps = scannedApps.filter(a => a.flags && a.flags.some(f => /missing.*\.env/i.test(getFlagText(f)) && !isAccepted(f)));
  const missingReadmeApps = scannedApps.filter(a => a.flags && a.flags.some(f => /missing.*readme/i.test(getFlagText(f)) && !isAccepted(f)));
  const consoleLogApps = scannedApps.filter(a => a.flags && a.flags.some(f => /console/i.test(getFlagText(f)) && !isAccepted(f)));
  const deprecatedApps = scannedApps.filter(a => a.tech && a.tech.frontend && /create.react.app|CRA/i.test(a.tech.frontend));
  const cveApps = scannedApps.filter(a => a.flags && a.flags.some(f => /CVE/i.test(getFlagText(f)) && !isAccepted(f)));
  const debtItems = missingEnvApps.length + missingReadmeApps.length + consoleLogApps.length + deprecatedApps.length + cveApps.length;
  const debtMax = scannedApps.length * 5;
  const debtScore = Math.max(0, Math.round(100 - (debtItems / debtMax * 100)));

  document.getElementById("panel-debt").innerHTML = `
    <div class="insight-panel-title" style="color:#e0a030">🔧 Tech Debt</div>
    <div class="insight-row"><span>Debt Score</span><span class="insight-row-val" style="color:${debtScore >= 70 ? '#4caf50' : debtScore >= 40 ? '#e0a030' : '#ff4444'}">${debtScore}/100</span></div>
    <div class="insight-bar"><div class="insight-bar-fill" style="width:${debtScore}%;background:${debtScore >= 70 ? '#4caf50' : debtScore >= 40 ? '#e0a030' : '#ff4444'}"></div></div>
    <div style="height:8px"></div>
    ${metricRow("Missing .env.example", missingEnvApps.length, missingEnvApps.length > 0 ? "#e0a030" : "#4caf50", "missing-env", missingEnvApps.map(a => a.name))}
    ${metricRow("Missing README", missingReadmeApps.length, missingReadmeApps.length > 0 ? "#e0a030" : "#4caf50", "missing-readme", missingReadmeApps.map(a => a.name))}
    ${metricRow("Console.logs in prod", consoleLogApps.length, consoleLogApps.length > 0 ? "#e0a030" : "#4caf50", "console-logs", consoleLogApps.map(a => a.name))}
    ${metricRow("Deprecated frameworks", deprecatedApps.length, deprecatedApps.length > 0 ? "#e0a030" : "#4caf50", "deprecated", deprecatedApps.map(a => a.name))}
    ${metricRow("Unfixed CVEs", cveApps.length, cveApps.length > 0 ? "#ff6666" : "#4caf50", "cves", cveApps.map(a => a.name))}
  `;

  // Portfolio Health
  const avgCompletion = withCompletion.length > 0 ? Math.round(withCompletion.reduce((s,a) => s + a.completion, 0) / withCompletion.length) : 0;
  const now = new Date();
  const staleApps = scannedApps.filter(a => {
    if (!a.lastUpdated) return false;
    const d = new Date(a.lastUpdated);
    return (now - d) / (1000*60*60*24) > 30;
  });
  const dbTypes = new Set();
  scannedApps.forEach(a => {
    if (!a.tech || !a.tech.dataStorage) return;
    const ds = a.tech.dataStorage.toLowerCase();
    if (/supabase/i.test(ds)) dbTypes.add("Supabase");
    if (/firebase|firestore/i.test(ds)) dbTypes.add("Firebase");
    if (/google sheets/i.test(ds)) dbTypes.add("Google Sheets");
    if (/localstorage/i.test(ds)) dbTypes.add("localStorage");
    if (/redis|upstash/i.test(ds)) dbTypes.add("Redis");
    if (/indexeddb/i.test(ds)) dbTypes.add("IndexedDB");
    if (/cloudflare r2/i.test(ds)) dbTypes.add("Cloudflare R2");
    if (/static json/i.test(ds)) dbTypes.add("Static JSON");
  });
  const complexity = scannedApps.map(a => {
    let score = 0;
    if (a.envSecrets) score += a.envSecrets.length;
    if (a.tech && a.tech.backend && !/none/i.test(a.tech.backend)) score += 2;
    if (a.tech && a.tech.dataStorage) {
      const ds = a.tech.dataStorage.toLowerCase();
      if (/supabase/i.test(ds)) score++;
      if (/firebase|firestore/i.test(ds)) score++;
      if (/google sheets/i.test(ds)) score++;
      if (/redis|upstash/i.test(ds)) score++;
      if (/cloudflare/i.test(ds)) score++;
    }
    return { name: a.name, score };
  }).sort((a,b) => b.score - a.score)[0] || { name: "-", score: 0 };

  const staleNames = staleApps.map(a => a.name);

  // Last scanned dates
  const scanDates = TRACKED.filter(a => a.scanned && a.lastUpdated)
    .map(a => ({ name: a.name, date: a.lastUpdated }))
    .sort((a, b) => b.date.localeCompare(a.date));
  const mostRecentScan = scanDates.length > 0 ? scanDates[0].date : "—";
  const scanDetailNames = scanDates.map(a => `${a.name}  ·  ${a.date}`);
  if (notScannedNames.length > 0) scanDetailNames.push(...notScannedNames.map(n => `${n}  ·  not scanned`));

  document.getElementById("panel-health").innerHTML = `
    <div class="insight-panel-title" style="color:#5b9bd5">📊 Portfolio Health</div>
    <div class="insight-row"><span>Avg Completion</span><span class="insight-row-val" style="color:${avgCompletion >= 80 ? '#4caf50' : avgCompletion >= 60 ? '#e0a030' : '#ff6666'}">${avgCompletion}%</span></div>
    <div class="insight-bar"><div class="insight-bar-fill" style="width:${avgCompletion}%;background:${avgCompletion >= 80 ? '#4caf50' : avgCompletion >= 60 ? '#e0a030' : '#ff6666'}"></div></div>
    <div style="height:8px"></div>
    ${metricRow("Last scanned", mostRecentScan, "#5b9bd5", "last-scanned", scanDetailNames)}
    ${metricRow("Stale (30+ days)", staleApps.length + " app" + (staleApps.length !== 1 ? "s" : ""), staleApps.length > 0 ? "#e0a030" : "#4caf50", "stale", staleNames)}
    <div class="insight-row"><span>Data stores in use</span><span class="insight-row-val">${dbTypes.size}</span></div>
    <div class="insight-row"><span>Most Integrations</span><span class="insight-row-val">${complexity.name} (${complexity.score})</span></div>
    ${metricRow("Not yet scanned", total - scanned, total - scanned > 0 ? "#e0a030" : "#4caf50", "not-scanned", notScannedNames)}
  `;

  // ── Tech Stack Summary ──
  function countTech(field, patterns) {
    const counts = {};
    scannedApps.forEach(a => {
      if (!a.tech || !a.tech[field]) return;
      const val = a.tech[field];
      patterns.forEach(([label, regex]) => {
        if (regex.test(val)) counts[label] = (counts[label] || 0) + 1;
      });
    });
    return Object.entries(counts).sort((a,b) => b[1] - a[1]);
  }

  function stackHTML(items) {
    return items.map(([label, count]) =>
      `<div class="stack-item"><span>${label}</span><span class="stack-item-count">${count} app${count !== 1 ? 's' : ''}</span></div>`
    ).join("");
  }

  const frameworks = countTech("frontend", [
    ["React", /react/i],
    ["Next.js", /next/i],
    ["Svelte", /svelte/i],
    ["Vite", /vite/i],
    ["TypeScript", /typescript/i],
    ["Tailwind CSS", /tailwind/i],
    ["Vanilla JS", /vanilla/i],
    ["Create React App", /create.react|react-scripts|CRA/i],
    ["Canvas API", /canvas/i],
    ["Leaflet", /leaflet/i],
    ["Recharts", /recharts/i],
    ["Framer Motion", /framer/i],
    ["Lucide React", /lucide/i],
  ]);

  const dataStores = countTech("dataStorage", [
    ["Supabase", /supabase/i],
    ["Firebase Firestore", /firestore/i],
    ["Firebase Realtime DB", /realtime/i],
    ["Google Sheets", /google sheets/i],
    ["localStorage", /localstorage/i],
    ["IndexedDB", /indexeddb/i],
    ["Cloudflare R2", /cloudflare r2|R2/i],
    ["Redis / Upstash", /redis|upstash/i],
    ["Static JSON", /static json/i],
  ]);

  const authMethods = countTech("auth", [
    ["None", /^none$/i],
    ["Firebase Auth", /firebase auth/i],
    ["Google OAuth", /google/i],
    ["PIN / Password", /pin|password/i],
    ["Email Allowlist", /email/i],
  ]);

  const hostingCounts = countTech("hosting", [
    ["Vercel", /vercel/i],
    ["Firebase Hosting", /firebase hosting/i],
  ]);

  const intCounts = {};
  const NORMALIZE = {
    "supabase auth": "Supabase",
    "supabase": "Supabase",
    "firebase": "Firebase",
    "firebase auth": "Firebase",
    "firebase cloud messaging": "Firebase",
    "firebase hosting": "Firebase",
    "cloudflare r2": "Cloudflare R2",
    "google sheets api": "Google Sheets",
    "google sheets api v4": "Google Sheets",
    "google sheets": "Google Sheets",
    "google sheets via apps script": "Google Sheets",
    "google apps script": "Google Apps Script",
    "google identity services": "Google OAuth",
    "google identity services / oauth2": "Google OAuth",
    "google oauth": "Google OAuth",
    "google oauth2": "Google OAuth",
    "google picker api": "Google Picker",
    "openai": "OpenAI",
    "anthropic claude api": "Anthropic Claude",
    "openai gpt api": "OpenAI",
    "john deere platform api": "John Deere API",
    "john deere aemp/iso 15143-3": "John Deere API",
    "html2pdf.js": "html2pdf.js",
    "jspdf": "jsPDF",
    "upstash redis": "Upstash Redis",
    "finnhub api": "Finnhub",
    "idb 8": null,
    "openstreetmap": null,
    "carto": null,
    "esri arcgis online": null,
    "firebase storage": "Firebase",
    "firebase realtime database": "Firebase",
    "firebase firestore": "Firebase",
  };

  scannedApps.forEach(a => {
    if (!a.tech) return;
    const seen = new Set(); // one count per app per service
    [a.tech.integrations, a.tech.dataStorage].forEach(field => {
      if (!field) return;
      field.split(",").forEach(i => {
        let name = i.trim().replace(/\(.*?\)/g, "").trim();
        if (!name || /^none|localstorage|indexeddb|static json|in-memory|zustand|^user/i.test(name)) return;
        if (/^\d|^@|geotiff|shpjs|JSZip|turf|tile servers|geospatial libs|public tile/i.test(name)) return;
        name = name.replace(/^.*?:\s*/, ""); // strip "Label: " prefixes
        name = name.split(".")[0].trim(); // take only before first period
        if (!name || name.length < 2) return;
        const normalized = NORMALIZE[name.toLowerCase()];
        if (normalized === null) return; // explicitly excluded
        const label = normalized || name;
        if (!seen.has(label)) {
          seen.add(label);
          intCounts[label] = (intCounts[label] || 0) + 1;
        }
      });
    });
  });
  const intSorted = Object.entries(intCounts).sort((a,b) => b[1] - a[1]);

  document.getElementById("panel-frameworks").innerHTML = `
    <div class="insight-panel-title" style="color:#5b9bd5">⚛ Frameworks & Libraries</div>
    ${stackHTML(frameworks)}
  `;

  document.getElementById("panel-data").innerHTML = `
    <div class="insight-panel-title" style="color:#e0a030">🗄 Data & Auth</div>
    <div style="font-size:10px;color:#555;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:6px">Storage</div>
    ${stackHTML(dataStores)}
    <div style="height:10px;border-top:1px solid #222;margin-top:8px;padding-top:8px"></div>
    <div style="font-size:10px;color:#555;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:6px">Auth Methods</div>
    ${stackHTML(authMethods)}
  `;

  document.getElementById("panel-infra").innerHTML = `
    <div class="insight-panel-title" style="color:#4caf50">🌐 Hosting & Services</div>
    <div style="font-size:10px;color:#555;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:6px">Hosting</div>
    ${stackHTML(hostingCounts)}
    <div style="height:10px;border-top:1px solid #222;margin-top:8px;padding-top:8px"></div>
    <div style="font-size:10px;color:#555;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:6px">Services & APIs</div>
    ${stackHTML(intSorted)}
  `;

  // ── Code Metrics ──
  const scannedWithMetrics = APPS.filter(a => a.metrics);
  // For aggregate code-metrics: include everything tracked PLUS the legacy
  // "dim" categories (typically Archived) so historical lines still count
  // toward totals. Exclude only the "excludeFromStats AND not dim" set —
  // those are pure noise categories like "Other".
  const allAppsForMetrics = APPS.filter(a => !categoryExcludedFromStats(a.category) || categoryIsDim(a.category));
  // Codex review 2026-05-21: extracted helper to handle apps that have totalLines but no codeLines.
  // Without this fallback, reduce/Math.max returned NaN — broke the "Total code lines" stat and
  // bar widths (width:NaN% renders as 0, invisible). Math.max(1, ...) avoids divide-by-zero in pct.
  const getCodeLines = m => Number(m?.codeLines ?? m?.totalLines ?? 0) || 0;
  const totalCodeLines = scannedWithMetrics.reduce((s, a) => s + getCodeLines(a.metrics), 0);
  const maxCodeLines = scannedWithMetrics.length > 0
    ? Math.max(1, ...scannedWithMetrics.map(a => getCodeLines(a.metrics)))
    : 1;

  // Panel 1: Codebase Size
  const sizeRows = allAppsForMetrics
    .map(a => ({ name: a.name, m: a.metrics }))
    .sort((a, b) => {
      if (a.m && b.m) return getCodeLines(b.m) - getCodeLines(a.m);
      if (a.m) return -1;
      if (b.m) return 1;
      return 0;
    });

  let sizeHTML = `<div class="insight-panel-title" style="color:#5b9bd5">📏 Codebase Size</div>`;
  sizeHTML += `<div class="insight-row"><span>Total code lines (scanned)</span><span class="insight-row-val" style="color:#5b9bd5">${totalCodeLines.toLocaleString()}</span></div>`;
  sizeHTML += `<div style="height:8px"></div>`;
  sizeRows.forEach(r => {
    if (r.m) {
      // Same fallback as the per-app metrics panel above.
      const _rCodeLines = r.m.codeLines ?? r.m.totalLines ?? 0;
      const _rTotalLines = r.m.totalLines ?? r.m.codeLines ?? 0;
      const pct = (_rCodeLines / maxCodeLines) * 100;
      sizeHTML += `<div class="metrics-bar-row">
        <span class="metrics-bar-label">${r.name}</span>
        <div class="metrics-bar-track"><div class="metrics-bar-fill" style="width:${pct}%;background:#5b9bd5"></div></div>
        <span class="metrics-bar-val">${_rCodeLines.toLocaleString()}</span>
      </div>`;
      if (r.m.dataLines > 0) {
        sizeHTML += `<div style="font-size:10px;color:#555;font-family:var(--mono);padding-left:108px;margin-top:-2px;margin-bottom:2px">${_rTotalLines.toLocaleString()} incl. data</div>`;
      }
    } else {
      sizeHTML += `<div class="metrics-bar-row">
        <span class="metrics-bar-label">${r.name}</span>
        <div class="metrics-bar-track"></div>
        <span class="metrics-bar-val" style="color:#555">Not scanned</span>
      </div>`;
    }
  });
  document.getElementById("panel-codesize").innerHTML = sizeHTML;

  // Panel 2: Refactor Candidates
  const largeFileApps = scannedWithMetrics.filter(a => a.metrics.filesOver500 > 0).sort((a, b) => b.metrics.filesOver500 - a.metrics.filesOver500);
  const dupApps = scannedWithMetrics.filter(a => a.metrics.duplicationAreas > 0).sort((a, b) => b.metrics.duplicationAreas - a.metrics.duplicationAreas);

  let refactorHTML = `<div class="insight-panel-title" style="color:#e0a030">🔧 Refactor Candidates</div>`;
  refactorHTML += `<div class="metrics-subsection">Large Files (1500+ lines)</div>`;
  if (largeFileApps.length === 0) {
    refactorHTML += `<div class="insight-row"><span style="color:#4caf50">No large files detected</span></div>`;
  } else {
    largeFileApps.forEach(a => {
      refactorHTML += `<div class="insight-row"><span>${a.name}</span><span class="insight-row-val" style="color:#e0a030">${a.metrics.filesOver500} file${a.metrics.filesOver500 !== 1 ? 's' : ''}</span></div>`;
    });
  }
  refactorHTML += `<div style="height:6px;border-top:1px solid #222;margin-top:8px;padding-top:8px"></div>`;
  refactorHTML += `<div class="metrics-subsection">Code Duplication</div>`;
  if (dupApps.length === 0) {
    refactorHTML += `<div class="insight-row"><span style="color:#4caf50">No duplication detected</span></div>`;
  } else {
    dupApps.forEach(a => {
      refactorHTML += `<div class="insight-row"><span>${a.name}</span><span class="insight-row-val" style="color:#e0a030">${a.metrics.duplicationAreas} area${a.metrics.duplicationAreas !== 1 ? 's' : ''}</span></div>`;
    });
  }
  document.getElementById("panel-refactor").innerHTML = refactorHTML;

  // Panel 3: Composition
  // Codex review 2026-05-21: coerce with Number() because not every app's metrics has these
  // fields populated — silent NaN propagation was rendering "NaN" in the aggregate stats.
  const totalComponents = scannedWithMetrics.reduce((s, a) => s + (Number(a.metrics.components) || 0), 0);
  const totalPages = scannedWithMetrics.reduce((s, a) => s + (Number(a.metrics.pages) || 0), 0);
  const totalApiRoutes = scannedWithMetrics.reduce((s, a) => s + (Number(a.metrics.apiRoutes) || 0), 0);

  const aggTypes = {};
  scannedWithMetrics.forEach(a => {
    Object.entries(a.metrics.linesByType || {}).forEach(([ext, lines]) => {
      // Codex review 2026-05-21: some apps' linesByType contains a "_note" string field
      // (e.g., "_note": "Aggregate count..." on the OPS Center API entry). Adding a string
      // to numeric counts corrupted the composition stacked bar. Skip non-numeric and
      // metadata-prefixed (_) keys.
      const n = Number(lines);
      if (!Number.isFinite(n) || n <= 0) return;
      if (ext.startsWith("_")) return;
      aggTypes[ext] = (aggTypes[ext] || 0) + n;
    });
  });
  const typeColors = { ".jsx": "#5b9bd5", ".js": "#e8c547", ".ts": "#b388d9", ".tsx": "#9966cc", ".css": "#4caf50", ".json": "#666" };
  const typeEntries = Object.entries(aggTypes).sort((a, b) => b[1] - a[1]);
  const totalTypeLines = typeEntries.reduce((s, [, v]) => s + v, 0);

  let compHTML = `<div class="insight-panel-title" style="color:#b388d9">📊 Composition</div>`;
  compHTML += `<div class="insight-row"><span>Components</span><span class="insight-row-val">${totalComponents}</span></div>`;
  compHTML += `<div class="insight-row"><span>Pages</span><span class="insight-row-val">${totalPages}</span></div>`;
  compHTML += `<div class="insight-row"><span>API Routes</span><span class="insight-row-val">${totalApiRoutes}</span></div>`;
  compHTML += `<div style="height:6px;border-top:1px solid #222;margin-top:8px;padding-top:8px"></div>`;
  compHTML += `<div class="metrics-subsection">Lines by File Type</div>`;
  if (totalTypeLines > 0) {
    compHTML += `<div class="metrics-stacked-bar">`;
    typeEntries.forEach(([ext, lines]) => {
      const pct = (lines / totalTypeLines) * 100;
      const color = typeColors[ext] || "#555";
      compHTML += `<div class="metrics-stacked-seg" style="width:${pct}%;background:${color}"></div>`;
    });
    compHTML += `</div>`;
    compHTML += `<div class="metrics-legend">`;
    typeEntries.forEach(([ext, lines]) => {
      const color = typeColors[ext] || "#555";
      compHTML += `<span class="metrics-legend-item"><span class="metrics-legend-swatch" style="background:${color}"></span>${ext} ${lines.toLocaleString()}</span>`;
    });
    compHTML += `</div>`;
  } else {
    compHTML += `<div class="insight-row"><span style="color:#555">No data yet</span></div>`;
  }
  document.getElementById("panel-composition").innerHTML = compHTML;

  document.getElementById("filters").innerHTML = cats.map(c => {
    const active = currentFilter === c;
    const accent = c === 'All' ? '#aaa' : (categoryAccent(c) || '#888');
    return `<button class="filter-btn${active ? ' active' : ''}" style="--accent-color:${accent}" onclick="setFilter('${c}')">${c}</button>`;
  }).join("");

  document.getElementById("sorts").innerHTML = `
    <span class="sort-label">Sort:</span>
    <button class="sort-btn${currentSort === 'critical' ? ' active' : ''}" onclick="setSort('critical')">🔴 Critical first</button>
    <button class="sort-btn${currentSort === 'flags' ? ' active' : ''}" onclick="setSort('flags')">⚠ Most flags</button>
    <button class="sort-btn${currentSort === 'completion' ? ' active-green' : ''}" onclick="setSort('completion')">% Least complete</button>
    <button class="sort-btn${currentSort === 'mostComplete' ? ' active-green' : ''}" onclick="setSort('mostComplete')">% Most complete</button>
    <button class="sort-btn${currentSort === 'grade' ? ' active' : ''}" onclick="setSort('grade')">🎓 Worst grade first</button>
  `;

  document.getElementById("grid").innerHTML = filtered.map((app) => {
    const realIdx = APPS.indexOf(app);
    return renderCard(app, realIdx);
  }).join("");
}

render();
</script>
</body>
</html>
